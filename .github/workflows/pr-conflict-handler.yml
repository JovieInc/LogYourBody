name: PR Conflict Handler

# Automatically resolves merge conflicts on agent PRs.
# Fires on:
#   - CI completion (conflict may surface as test failure)
#   - Schedule weekday safety net
#   - Manual dispatch
#
# NOTE: no `pull_request: synchronize` trigger. This is a FLEET-WIDE scan that
# lists all open PRs, so per-push spawns are pure duplication: every push
# already triggers CI, which fires the workflow_run below. Removed in #13359.

on:
  workflow_dispatch:
    inputs:
      apply:
        description: 'Apply safe mutations (labels/update-branch/guarded rebase). Defaults to dry-run.'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      max_concurrent:
        description: 'Maximum CI-heavy PR freshness re-triggers, including in-flight CI.'
        required: false
        default: '2'
  schedule:
    # Read-only audit. Do not auto-push/rebase the fleet on a tight cadence.
    - cron: '17 15 * * 1-5'
  workflow_run:
    workflows: ['CI']
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  issues: write
  checks: read
  statuses: read

defaults:
  run:
    shell: bash

jobs:
  plan:
    name: Classify and plan PR freshness
    runs-on: ${{ vars.CI_FAST_RUNNER }}
    concurrency:
      group: pr-conflict-handler-${{ github.repository }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.13.1'

      - name: Run handler
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          MODE="--dry-run"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.apply }}" == "true" ]]; then
            MODE="--apply"
          fi

          node scripts/pr-conflict-handler.mjs "$MODE" \
            --repo "${{ github.repository }}" \
            --max-concurrent "${{ inputs.max_concurrent || '2' }}" \
            --json | tee pr-conflict-handler-plan.log

      - name: Summarize
        if: always()
        run: |
          {
            echo '## PR conflict handler plan'
            echo
            echo '```text'
            sed -n '1,160p' pr-conflict-handler-plan.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
