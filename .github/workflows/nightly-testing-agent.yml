name: Nightly Testing Agent

on:
  schedule:
    - cron: '30 2 * * *'
      timezone: 'America/Los_Angeles'
  workflow_dispatch:
    inputs:
      run_unit:
        description: Run the deterministic Vitest telemetry lane
        type: boolean
        default: true
      run_mutation:
        description: Run the Stryker mutation hotspot lane
        type: boolean
        default: true
      validate_candidates:
        description: Validate candidate tests committed under the skill candidates directory
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: nightly-testing-agent-${{ github.ref }}
  cancel-in-progress: false

jobs:
  context:
    name: Build Agent Context
    runs-on: ${{ vars.CI_FAST_RUNNER }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 20

      - uses: ./.github/actions/setup-node-pnpm

      - name: Build compact context
        run: >-
          pnpm --filter=@jovie/web run test:nightly-agent:context --
          --out apps/web/test-results/nightly-agent/context

      - name: Select risk-ranked targets
        run: >-
          pnpm --filter=@jovie/web run test:nightly-agent:select --
          --out apps/web/test-results/nightly-agent/context

      - name: Upload agent context
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nightly-agent-context-${{ github.run_id }}
          path: apps/web/test-results/nightly-agent/
          retention-days: 30

  deterministic:
    name: Deterministic Unit Telemetry
    needs: [context]
    if: ${{ github.event_name == 'schedule' || inputs.run_unit }}
    runs-on: ${{ vars.CI_FAST_RUNNER }}
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-node-pnpm

      - name: Run unit suite
        id: unit
        continue-on-error: true
        run: pnpm --filter=@jovie/web run test
        env:
          CI: 'true'
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}

      - name: Normalize unit telemetry
        if: always()
        run: >-
          pnpm --filter=@jovie/web run test:nightly-agent:normalize --
          --junit apps/web/test-report.junit.xml
          --out apps/web/test-results/nightly-agent/deterministic
          --name normalized-results.json

      - name: Upload deterministic telemetry
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nightly-agent-deterministic-${{ github.run_id }}
          path: |
            apps/web/test-report.junit.xml
            apps/web/test-results/nightly-agent/
          if-no-files-found: ignore
          retention-days: 30

      - name: Preserve unit failure signal
        if: steps.unit.outcome == 'failure'
        run: exit 1

  mutation-hotspots:
    name: Mutation Hotspots
    needs: [context]
    if: ${{ github.event_name == 'schedule' || inputs.run_mutation }}
    runs-on: ${{ vars.CI_FAST_RUNNER }}
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 20

      - uses: ./.github/actions/setup-node-pnpm

      - name: Run Stryker hotspot mutation lane
        id: mutation
        continue-on-error: true
        run: pnpm --filter=@jovie/web run test:mutation:hotspots
        env:
          CI: 'true'

      - name: Normalize mutation telemetry
        if: always()
        run: >-
          pnpm --filter=@jovie/web run test:nightly-agent:normalize --
          --mutation apps/web/reports/mutation/mutation.json
          --out apps/web/test-results/nightly-agent/mutation
          --name normalized-results.json

      - name: Upload mutation telemetry
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nightly-agent-mutation-${{ github.run_id }}
          path: |
            apps/web/reports/mutation/
            apps/web/reports/stryker-incremental.json
            apps/web/test-results/nightly-agent/
          if-no-files-found: ignore
          retention-days: 30

      - name: Preserve mutation setup failure signal
        if: steps.mutation.outcome == 'failure'
        run: exit 1

  candidate-validation:
    name: Candidate Test Validation
    needs: [context]
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.validate_candidates }}
    runs-on: ${{ vars.CI_FAST_RUNNER }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-node-pnpm

      - name: Validate candidate metadata and focused commands
        run: >-
          pnpm --filter=@jovie/web run test:nightly-agent:validate-candidate --
          --out apps/web/test-results/nightly-agent/candidate-validation
          --execute true

      - name: Upload candidate validation report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nightly-agent-candidate-validation-${{ github.run_id }}
          path: apps/web/test-results/nightly-agent/
          if-no-files-found: ignore
          retention-days: 30

  report:
    name: Emit Agent Report
    needs: [context, deterministic, mutation-hotspots, candidate-validation]
    if: always()
    runs-on: ${{ vars.CI_FAST_RUNNER }}
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/setup-node-pnpm

      - name: Download agent artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v6.0.0
        with:
          pattern: nightly-agent-*-${{ github.run_id }}
          path: apps/web/test-results/nightly-agent/incoming
          merge-multiple: true

      - name: Emit compact report and skill delta
        run: >-
          pnpm --filter=@jovie/web run test:nightly-agent:emit-delta --
          --input-dir apps/web/test-results/nightly-agent/incoming

      - name: Resolve workflow conclusion
        id: conclusion
        run: |
          if [ "${{ needs.deterministic.result }}" = "failure" ]; then
            echo "value=failure" >> "$GITHUB_OUTPUT"
          elif [ "${{ needs.mutation-hotspots.result }}" = "cancelled" ]; then
            echo "value=cancelled" >> "$GITHUB_OUTPUT"
          elif [ "${{ needs.mutation-hotspots.result }}" = "failure" ]; then
            echo "value=failure" >> "$GITHUB_OUTPUT"
          else
            echo "value=success" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish daily report and ops status
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          WORKFLOW_CONCLUSION: ${{ steps.conclusion.outputs.value }}
        run: >-
          pnpm --filter=@jovie/web run test:nightly-agent:publish-status --
          --input-dir apps/web/test-results/nightly-agent/incoming
          --workflow-run-url "$WORKFLOW_RUN_URL"
          --workflow-conclusion "$WORKFLOW_CONCLUSION"

      - name: Add report to job summary
        run: cat apps/web/test-results/nightly-agent/nightly-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Commit daily report when changed
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          if git diff --quiet docs/NIGHTLY_TESTING_AGENT_REPORT.md apps/web/reports/nightly-agent/last-run.json 2>/dev/null; then
            echo "No nightly report changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main || {
            echo "Rebase failed — exiting without push."
            exit 1
          }
          git add docs/NIGHTLY_TESTING_AGENT_REPORT.md apps/web/reports/nightly-agent/last-run.json
          if git diff --staged --quiet; then
            echo "Nothing staged after rebase."
            exit 0
          fi
          git commit -m "chore(testing): nightly testing agent daily report" \
            -m "Auto-generated by .github/workflows/nightly-testing-agent.yml." \
            -m "Co-Authored-By: Claude Opus 4.7 (1M context) <noreply@anthropic.com>"
          git push

      - name: Upload final report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nightly-agent-report-${{ github.run_id }}
          path: |
            apps/web/test-results/nightly-agent/
            docs/NIGHTLY_TESTING_AGENT_REPORT.md
            apps/web/reports/nightly-agent/last-run.json
          if-no-files-found: ignore
          retention-days: 90
