name: Agent Harness Health Report

on:
  schedule:
    # Weekly report every Tuesday at 09:00 UTC.
    - cron: '0 9 * * 2'
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  pull-requests: read
  issues: read

concurrency:
  group: agent-harness-health-report
  cancel-in-progress: true

jobs:
  report:
    name: Generate Agent Harness Health Report
    runs-on: ${{ vars.CI_FAST_RUNNER }}
    timeout-minutes: 8
    steps:
      - name: Generate report
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          REPORT_PATH: ${{ runner.temp }}/agent-harness-health-report.md
        run: |
          set -euo pipefail

          REPORT="$REPORT_PATH"
          NOW_ISO=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          NOW_SECONDS=$(date -u +%s)

          PRS=$(gh pr list --repo "$GH_REPO" --state open --limit 100 \
            --json number,title,headRefName,headRefOid,isDraft,labels,updatedAt,autoMergeRequest,mergeStateStatus)
          AGENT_PRS=$(echo "$PRS" | jq '[.[] | select((.headRefName | test("^(linear/|claude/|codegen-bot/|codex/)"; "i")) or (.headRefName | test("(^|/)jov-[0-9]+"; "i")))]')
          SYSTEMIC_PRS=$(gh pr list --repo "$GH_REPO" --state open --label systemic-blocker --limit 50 --json number,title,headRefName,updatedAt)
          NEEDS_HUMAN_PRS=$(gh pr list --repo "$GH_REPO" --state open --label needs-human --limit 50 --json number,title,headRefName,updatedAt)
          FLAKINESS_ISSUES=$(gh issue list --repo "$GH_REPO" --state open --label test-flakiness --limit 20 --json number,title,updatedAt,url)
          CI_RUNS=$(gh run list --repo "$GH_REPO" --workflow CI --status completed --limit 30 --json databaseId,conclusion,createdAt,displayTitle,event,headBranch,url)

          {
            echo "# Agent Harness Health Report"
            echo
            echo "Generated: $NOW_ISO"
            echo
            echo "## Summary"
            echo
            echo "- Open agent PRs: $(echo "$AGENT_PRS" | jq 'length')"
            echo "- Systemic blocker PRs: $(echo "$SYSTEMIC_PRS" | jq 'length')"
            echo "- Needs-human PRs: $(echo "$NEEDS_HUMAN_PRS" | jq 'length')"
            echo "- Open flakiness issues: $(echo "$FLAKINESS_ISSUES" | jq 'length')"
            echo "- Recent failed CI runs: $(echo "$CI_RUNS" | jq '[.[] | select(.conclusion != "success")] | length')"
            echo
            echo "## Stuck Agent PRs"
            echo
            echo "| PR | Branch | Age | State | Labels |"
            echo "| --- | --- | ---: | --- | --- |"
            echo "$AGENT_PRS" | jq -r --argjson now "$NOW_SECONDS" '
              .[]
              | .ageHours = (($now - (.updatedAt | fromdateiso8601)) / 3600 | floor)
              | select(.ageHours >= 24)
              | "| #\(.number) \(.title) | `\(.headRefName)` | \(.ageHours)h | \(.mergeStateStatus // "unknown") | \([.labels[].name] | join(", ")) |"
            '
            echo
            echo "## Auto-Merge Miss Candidates"
            echo
            echo "Agent PRs with an auto-landing label but no active auto-merge request."
            echo
            echo "| PR | Branch | Merge state | Labels |"
            echo "| --- | --- | --- | --- |"
            echo "$AGENT_PRS" | jq -r '
              .[]
              | select(.isDraft == false)
              | select(.autoMergeRequest == null)
              | select([.labels[].name] | any(. == "automerge" or . == "auto-approved" or . == "ai:ready-to-merge"))
              | "| #\(.number) \(.title) | `\(.headRefName)` | \(.mergeStateStatus // "unknown") | \([.labels[].name] | join(", ")) |"
            '
            echo
            echo "## Systemic Blockers"
            echo
            echo "$SYSTEMIC_PRS" | jq -r '.[] | "- #\(.number) \(.title) (`\(.headRefName)`, updated \(.updatedAt))"' || true
            echo
            echo "## Needs-Human Stops"
            echo
            echo "$NEEDS_HUMAN_PRS" | jq -r '.[] | "- #\(.number) \(.title) (`\(.headRefName)`, updated \(.updatedAt))"' || true
            echo
            echo "## Flaky Gate Reports"
            echo
            echo "$FLAKINESS_ISSUES" | jq -r '.[] | "- [#\(.number) \(.title)](\(.url)) updated \(.updatedAt)"' || true
            echo
            echo "## Recent CI Failures"
            echo
            echo "| Run | Branch | Event | Conclusion | Created |"
            echo "| --- | --- | --- | --- | --- |"
            echo "$CI_RUNS" | jq -r '
              .[]
              | select(.conclusion != "success")
              | "| [\(.displayTitle)](\(.url)) | `\(.headBranch)` | \(.event) | \(.conclusion) | \(.createdAt) |"
            '
          } > "$REPORT"

          cat "$REPORT" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: agent-harness-health-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/agent-harness-health-report.md
          retention-days: 30
