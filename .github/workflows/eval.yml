# Promptfoo CI Eval Gate (JOV-3657)
#
# Runs the golden-case Promptfoo suite on PRs that touch prompt/eval infra.
# Lane order: deterministic (no spend) first, then budget-capped judge lane.
#
# BUDGET_CAP_USD (repo variable, default 0.50):
#   - "0" skips the judge lane entirely (no LLM spend)
#   - Any positive value allows the judge lane when OPENAI_API_KEY is set

name: Eval Gate

on:
  pull_request:
    paths:
      - 'apps/web/prompts/**'
      - 'apps/web/promptfooconfig.yaml'
      - 'apps/web/tests/eval/golden/**'
      - '.github/workflows/eval.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: eval-gate-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

env:
  JOVIE_RUN_LIVE_EVALS: '0'
  JOVIE_RUN_LIVE_HTTP_EVALS: '0'
  JOVIE_RUN_LIVE_HTTP_RATE_LIMIT_EVALS: '0'
  JOVIE_RUN_LIVE_HTTP_MODEL_ERROR_EVALS: '0'
  PROMPTFOO_DISABLE_TELEMETRY: '1'
  PROMPTFOO_DISABLE_UPDATE: '1'
  PROMPTFOO_NO_TESTCASE_ASSERT_WARNING: '1'
  BUDGET_CAP_USD: ${{ vars.BUDGET_CAP_USD || '0.50' }}

jobs:
  eval:
    name: Promptfoo Eval Gate
    runs-on: ${{ vars.CI_FAST_RUNNER }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-node-pnpm

      - name: Cache Promptfoo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/promptfoo
          key: ${{ runner.os }}-promptfoo-${{ hashFiles('apps/web/promptfooconfig.yaml', 'apps/web/promptfooconfig.judge.yaml', 'apps/web/tests/eval/golden/promptfoo-cases-generator.ts') }}
          restore-keys: |
            ${{ runner.os }}-promptfoo-

      - name: Detect judge lane prerequisites
        id: judge_gate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [[ -n "${OPENAI_API_KEY:-}" ]]; then
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_key=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate Promptfoo config
        working-directory: apps/web
        run: pnpm exec promptfoo validate -c promptfooconfig.yaml

      - name: Run deterministic lane (no spend)
        id: deterministic
        working-directory: apps/web
        run: |
          set -euo pipefail
          mkdir -p .promptfoo/output
          pnpm exec promptfoo eval \
            -c promptfooconfig.yaml \
            --no-cache \
            --no-share \
            --no-table \
            -o .promptfoo/output/deterministic.json
          echo "Deterministic lane passed."

      - name: Run judge lane (budget-capped)
        id: judge
        if: ${{ env.BUDGET_CAP_USD != '0' && steps.judge_gate.outputs.has_key == 'true' }}
        working-directory: apps/web
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          mkdir -p .promptfoo/output
          echo "Judge lane budget cap: ${BUDGET_CAP_USD} USD"
          pnpm exec promptfoo validate -c promptfooconfig.judge.yaml
          pnpm exec promptfoo eval \
            -c promptfooconfig.judge.yaml \
            --no-cache \
            --no-share \
            --no-table \
            -o .promptfoo/output/judge.json
          echo "Judge lane passed."

      - name: Post Promptfoo viewer comment (deterministic)
        if: github.event_name == 'pull_request' && steps.deterministic.outcome == 'success'
        uses: promptfoo/promptfoo-action@04839e664f52212b877170219dab0d7ad2bf6440 # v1
        continue-on-error: true
        with:
          github-token: ${{ github.token }}
          config: promptfooconfig.yaml
          prompts: |
            prompts/**/*.md
          working-directory: apps/web
          promptfoo-version: '0.121.12'
          force-run: 'true'
          no-cache: 'true'
          no-share: 'true'
          no-table: 'true'
          disable-comment: 'true'

      - name: Record judge skip reason
        id: judge_skip
        if: ${{ always() && (env.BUDGET_CAP_USD == '0' || steps.judge_gate.outputs.has_key != 'true') }}
        run: |
          if [[ "${{ env.BUDGET_CAP_USD }}" == "0" ]]; then
            echo "reason=BUDGET_CAP_USD is 0 — judge lane skipped (deterministic only)" >> "$GITHUB_OUTPUT"
          else
            echo "reason=OPENAI_API_KEY not configured — judge lane skipped" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: promptfoo-eval-${{ github.event.pull_request.number || github.run_id }}
          path: |
            apps/web/.promptfoo/output/*.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Post PR comment
        if: github.event_name == 'pull_request' && always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          PR_NUMBER="${{ github.event.pull_request.number }}"
          DETERMINISTIC_STATUS="${{ steps.deterministic.outcome }}"
          JUDGE_STATUS="${{ steps.judge.outcome }}"
          JUDGE_SKIP="${{ steps.judge_skip.outputs.reason }}"

          BODY=$(cat <<EOF
          ## Promptfoo Eval Gate

          | Lane | Status |
          | --- | --- |
          | Deterministic (mocked golden cases) | ${DETERMINISTIC_STATUS} |
          | Judge (LLM rubric, budget-capped) | ${JUDGE_STATUS:-skipped} |

          **Budget cap:** \`${{ env.BUDGET_CAP_USD }}\` USD
          ${JUDGE_SKIP:+**Judge skip:** ${JUDGE_SKIP}}

          Artifacts: \`promptfoo-eval-${PR_NUMBER}\` (JSON results)

          <!-- promptfoo-eval-gate -->
          EOF
          )

          EXISTING=$(gh pr view "$PR_NUMBER" --json comments --jq '.comments[].body' | grep -F '<!-- promptfoo-eval-gate -->' || true)
          if [[ -n "$EXISTING" ]]; then
            COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" --jq '.[] | select(.body | contains("<!-- promptfoo-eval-gate -->")) | .id' | head -1)
            if [[ -n "$COMMENT_ID" ]]; then
              gh api -X PATCH "repos/${{ github.repository }}/issues/comments/${COMMENT_ID}" -f body="$BODY" >/dev/null
              exit 0
            fi
          fi

          gh pr comment "$PR_NUMBER" --body "$BODY"

      - name: Fail if deterministic lane failed
        if: steps.deterministic.outcome == 'failure'
        run: exit 1
