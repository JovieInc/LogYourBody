name: Observability Issue Sync

on:
  repository_dispatch:
    types: [observability-report]

permissions: {}

concurrency:
  group: observability-issue-${{ github.event.client_payload.fingerprint }}
  cancel-in-progress: false

jobs:
  sync-issue:
    runs-on: ${{ vars.CI_FAST_RUNNER }}
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4.4.0
        with:
          node-version-file: .nvmrc

      - name: Generate Jovie Bot token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.JOVIE_BOT_APP_ID }}
          private-key: ${{ secrets.JOVIE_BOT_PRIVATE_KEY }}

      - name: Sync deduped observability issue
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          OBSERVABILITY_PAYLOAD: ${{ toJson(github.event.client_payload) }}
          OCCURRENCE_DELTA: ${{ github.event.client_payload.occurrence_delta }}
        run: node scripts/observability-issue-github.mjs