name: Taste Classifier

# Automated taste-call classifier for Jovie's autonomous shipping system.
# Analyzes PR diff + metadata to determine whether it genuinely needs
# Tim's eyes (taste/UX/copy/design judgment) vs. can be handled by stronger
# LLM review vs. auto-shipped.
#
# Outputs:
#   - Posts classification as a PR comment
#   - Applies the appropriate label: llm-review or merge-queue. Full-autonomy
#     policy (2026-07-06): taste-flagged PRs ship autonomously after strong LLM
#     review; humans steer via issues + post-ship production walkthroughs, not
#     pre-merge gates. The classification comment remains the steering signal.

# NOTE: no `labeled` trigger — labels don't change the diff, and re-classifying
# on label events created a loop where the classifier reverted human unlabels
# (JOV-3808, PR #12688). Classification runs only when the content changes.
on:
  pull_request:
    types: [opened, ready_for_review, synchronize]

permissions:
  pull-requests: write
  contents: read

concurrency:
  group: taste-classifier-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  classify:
    name: Classify PR taste
    runs-on: ${{ vars.CI_FAST_RUNNER }}
    timeout-minutes: 5
    steps:
      # Dedup guard (#13348): classify once per head SHA, not once per event.
      # Re-fires on synchronize bursts were posting 2-3 duplicate classification
      # comments per PR. The marker comment records the classified SHA; if it
      # matches the current head, skip the whole run.
      - name: Check for existing classification of this head SHA
        id: dedupe
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const marker = '<!-- bot-comment:taste-classifier -->';
            const headSha = context.payload.pull_request.head.sha;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find(c => c.body?.includes(marker));
            const alreadyClassified = Boolean(
              existing?.body?.includes(`<!-- classified-sha:${headSha} -->`)
            );
            core.setOutput('skip', alreadyClassified ? 'true' : 'false');
            core.setOutput('comment_id', existing ? String(existing.id) : '');
            if (alreadyClassified) {
              core.info(`Head ${headSha} already classified in comment ${existing.id}; skipping.`);
            }

      - name: Checkout repository
        if: steps.dedupe.outputs.skip != 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node 24
        if: steps.dedupe.outputs.skip != 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Enable corepack
        if: steps.dedupe.outputs.skip != 'true'
        env:
          COREPACK_HOME: /tmp/corepack
        run: corepack enable --install-directory /tmp/corepack

      - name: Install dependencies
        if: steps.dedupe.outputs.skip != 'true'
        run: pnpm install --frozen-lockfile

      - name: Run taste classifier
        id: classify
        if: steps.dedupe.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          node scripts/taste-classifier.mjs --pr "$PR_NUMBER" --json > taste-classification.json 2>&1 || true
          cat taste-classification.json
          CLASSIFICATION=$(jq -r '.classification' taste-classification.json)
          echo "classification=$CLASSIFICATION" >> "$GITHUB_OUTPUT"

      - name: Post classification comment and apply label
        if: steps.dedupe.outputs.skip != 'true' && steps.classify.outputs.classification != ''
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          EXISTING_COMMENT_ID: ${{ steps.dedupe.outputs.comment_id }}
        with:
          script: |
            const fs = require('fs');
            const classification = JSON.parse(fs.readFileSync('taste-classification.json', 'utf8'));

            const { pr: prNumber, classification: result, confidence, reason, signals } = classification;

            // Build comment with dedupe markers
            const marker = '<!-- bot-comment:taste-classifier -->';
            const headSha = context.payload.pull_request.head.sha;
            const shaMarker = `<!-- classified-sha:${headSha} -->`;

            const emoji = {
              'taste-required': '🎨',
              'llm-reviewable': '🤖',
              'auto-ship': '🚀',
            };
            const emojiIcon = emoji[result] || '🔍';

            let comment = `${marker}\n${shaMarker}\n`;
            comment += `## ${emojiIcon} Taste Classifier: \`${result}\`\n\n`;
            comment += `**Confidence:** ${(confidence * 100).toFixed(0)}%\n`;
            comment += `**Reason:** ${reason}\n\n`;

            if (signals && signals.length > 0) {
              comment += `**Key signals:**\n`;
              for (const sig of signals.slice(0, 8)) {
                comment += `- \`${sig}\`\n`;
              }
              comment += '\n';
            }

            if (result === 'taste-required') {
              comment += '> 🎨 Taste surface — ships autonomously after strong LLM review. Flagged for post-ship production walkthrough.\n';
            } else if (result === 'llm-reviewable') {
              comment += '> ✅ No taste gate needed. Strong LLM review will validate correctness.\n';
            } else {
              comment += '> 🚀 Auto-ship eligible. Will merge once CI is green.\n';
            }

            comment += '\n*— Taste classifier v1.0 (autonomous shipping system)*';

            // Upsert: edit existing comment if one exists
            const existingId = process.env.EXISTING_COMMENT_ID;
            if (existingId) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: parseInt(existingId),
                body: comment,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment,
              });
            }

            // Apply label
            const labelMap = {
              'taste-required': 'llm-review',
              'llm-reviewable': 'llm-review',
              'auto-ship': 'merge-queue',
            };
            const label = labelMap[result];
            if (label) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [label],
              });
            }
