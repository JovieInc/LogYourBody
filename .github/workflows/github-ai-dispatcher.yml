# GitHub AI Dispatcher
#
# Scheduled retry loop for issues labeled agent-ready. The dispatcher is
# label-scoped so the orchestrator can open more work only when capacity allows.

name: GitHub AI Dispatcher

on:
  workflow_dispatch:
    inputs:
      ready_label:
        description: 'Only dispatch open issues with this label'
        required: false
        default: 'agent-ready'
      max_dispatch:
        description: 'Maximum issues to dispatch this run'
        required: false
        default: '2'
      dry_run:
        description: 'Log candidates without dispatching'
        required: false
        default: 'false'

permissions: {}

concurrency:
  group: github-ai-dispatcher
  cancel-in-progress: false

jobs:
  dispatch:
    name: Dispatch Ready GitHub Issues
    runs-on: ${{ vars.CI_FAST_RUNNER }}
    timeout-minutes: 10
    permissions:
      contents: read
      issues: read
      actions: write
    env:
      READY_LABEL: ${{ inputs.ready_label || 'agent-ready' }}
      MAX_DISPATCH: ${{ inputs.max_dispatch || '2' }}
      DRY_RUN: ${{ inputs.dry_run || 'false' }}
      MAX_OPEN_AGENT_PRS: '5'
    steps:
      - name: Generate Jovie Bot token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.JOVIE_BOT_APP_ID }}
          private-key: ${{ secrets.JOVIE_BOT_PRIVATE_KEY }}

      - name: Checkout tracker helpers
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          sparse-checkout: |
            scripts/lib/tracker.mjs
            scripts/github-query-todo.mjs
          sparse-checkout-cone-mode: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Find capacity and dispatch candidates
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail

          OPEN_AGENT_PRS=$(gh api "repos/${{ github.repository }}/pulls?state=open&per_page=100" \
            | jq '[.[] | select(.head.ref | test("^(codex|codegen-bot|linear|claude)/") or test("^[^/]+/jov-[0-9]+-"; "i"))] | length')

          CAPACITY=$((MAX_OPEN_AGENT_PRS - OPEN_AGENT_PRS))
          if [[ "$CAPACITY" -le 0 ]]; then
            echo "No dispatch capacity: $OPEN_AGENT_PRS / $MAX_OPEN_AGENT_PRS agent PRs are open"
            exit 0
          fi

          if [[ "$MAX_DISPATCH" -gt "$CAPACITY" ]]; then
            MAX_DISPATCH="$CAPACITY"
          fi

          echo "Dispatch capacity: $MAX_DISPATCH issue(s)"

          CANDIDATES=$(node scripts/github-query-todo.mjs | head -n "$MAX_DISPATCH" || true)
          if [[ -z "$CANDIDATES" ]]; then
            echo "No dispatchable issues with label '$READY_LABEL'"
            exit 0
          fi

          printf '%s\n' "$CANDIDATES" | while IFS=$'\t' read -r issue_ref _labels title; do
            [[ -z "$issue_ref" ]] && continue
            ISSUE_NUMBER="${issue_ref#\#}"
            echo "Candidate: #${ISSUE_NUMBER} - ${title}"

            EXISTING_PR_COUNT=$(gh pr list --state open --limit 100 --json number,title,body \
              | jq --arg num "$ISSUE_NUMBER" \
                'map(select(((.title // "") + "\n" + (.body // "")) | test("Fixes #" + $num + "\\b"; "i") or test("Closes #" + $num + "\\b"; "i"))) | length')
            if [[ "$EXISTING_PR_COUNT" != "0" ]]; then
              echo "Open PR already references #${ISSUE_NUMBER}; skipping"
              continue
            fi

            if [[ "${DRY_RUN,,}" == "true" ]]; then
              continue
            fi

            if ! gh workflow run github-ai-orchestrator.yml \
                --ref main \
                -f issue_number="$ISSUE_NUMBER"; then
              echo "::warning::Workflow dispatch failed for #${ISSUE_NUMBER}"
              continue
            fi

            echo "Dispatched github-ai-orchestrator for #${ISSUE_NUMBER}"
          done