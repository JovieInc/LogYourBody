name: Taste Label Guard

# Backstop for the taste gate. Tim's directive (#product, 2026-06-26):
# `needs:taste` / `needs-human-taste` is ONLY for a material, subjective UX
# judgment a human must make. Chores, dep bumps, CI/bug fixes, refactors, and
# guardrail-alignment auto-flow. When a taste label is APPLIED to a PR whose
# conventional-commit type is non-taste and it has no `ux:material` marker, this
# workflow clears the label so the PR keeps flowing (self-healing — taste gates
# should shrink, not grow).
#
# Triggers on `labeled` ONLY (not `edited`): the title is evaluated at the moment
# the label lands, so an author cannot retitle `feat:` -> `chore:` after the fact
# to strip a gate someone applied. To keep a taste label on a non-taste-typed PR,
# add the `ux:material` marker.
#
# Logic + tests: scripts/lib/taste-label-guard.mjs (+ __tests__).
# See .claude/rules/release.md and docs/company/autonomous-shipping-doctrine.md.

on:
  pull_request:
    types: [labeled]

permissions: {}

concurrency:
  group: taste-label-guard-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  guard:
    name: Taste Label Guard
    runs-on: ${{ vars.CI_FAST_RUNNER }}
    timeout-minutes: 3
    # Same-repo PRs only (fork PRs get a read-only token), and only when the
    # label just applied is actually a taste gate.
    if: >-
      github.event.pull_request.head.repo.fork == false &&
      (
        github.event.label.name == 'needs:taste' ||
        github.event.label.name == 'needs-human-taste'
      )
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Clear mis-applied taste label
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: node scripts/taste-label-guard.mjs fix-pr --pr "$PR_NUMBER" --apply
