# Deterministic slop gate for AI-generated copy (JOV-#11098).
#
# Runs slopcheck.py on changed .md / .mdx / marketing-copy files.
# Currently advisory (continue-on-error: true). Flip to blocking after
# a tuning week by removing continue-on-error and adding the job to
# the merge gate list in ci-harness/manifest.json.
#
# Zero cost: pure Python, no API keys, no network calls.
name: Slop Gate

on:
  pull_request:
    branches: [main]
    paths:
      - '**.md'
      - '**.mdx'
      - 'apps/web/app/(marketing)/**'
      - 'apps/web/components/features/home/**'
      - 'docs/**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  slopcheck:
    name: Slop Gate (advisory)
    runs-on: ${{ vars.CI_FAST_RUNNER }}
    # ponytail: advisory until tuning week ends — flip to blocking by removing continue-on-error
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Get changed copy files
        id: changed
        run: |
          # Files changed vs. base branch that match copy patterns.
          # --diff-filter=d excludes deleted files (can't slopcheck a removed file).
          # CHANGELOG.md is excluded: it is append-only and /ship-generated, so the
          # whole-file slop score only ever grows and always fails regardless of the
          # new entry's quality. Changelog copy quality is governed by the changelog
          # format rules in .claude/rules/release.md, not this marketing-copy gate.
          git diff --name-only --diff-filter=d origin/${{ github.base_ref }}...HEAD \
            | grep -E '\.(md|mdx)$' \
            | grep -v -E '^(node_modules|\.cache|drizzle/migrations|DESIGN\.md)' \
            | grep -v -E '(^|/)CHANGELOG\.md$' \
            > /tmp/changed_copy_files.txt || true

          if [ -s /tmp/changed_copy_files.txt ]; then
            echo "has_files=true" >> "$GITHUB_OUTPUT"
            echo "Changed copy files:"
            cat /tmp/changed_copy_files.txt
          else
            echo "has_files=false" >> "$GITHUB_OUTPUT"
            echo "No copy files changed."
          fi

      - name: Run slopcheck on changed files
        if: steps.changed.outputs.has_files == 'true'
        run: |
          mapfile -t files < /tmp/changed_copy_files.txt
          python3 scripts/slopcheck.py --max 3.0 --diff-base "origin/${{ github.base_ref }}" "${files[@]}"

      - name: No copy files changed — skip
        if: steps.changed.outputs.has_files == 'false'
        run: echo "No .md/.mdx files changed — slop gate skipped."

  slopcheck-unit-tests:
    name: slopcheck.py unit tests
    runs-on: ${{ vars.CI_FAST_RUNNER }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Install pytest
        run: pip install pytest --quiet

      - name: Run slopcheck unit tests
        run: pytest scripts/tests/test_slopcheck.py -v
