name: iOS TestFlight

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: Optional App Store build number override
        required: false
      changelog:
        description: Optional TestFlight changelog
        required: false
  push:
    branches: [main]
    paths:
      - "apps/ios/**"
      - "fastlane/**"
      - "Gemfile"
      - "Gemfile.lock"
      - ".github/workflows/ios-testflight.yml"

permissions:
  contents: read

concurrency:
  group: ios-testflight-${{ github.ref }}
  cancel-in-progress: false

jobs:
  beta:
    name: Upload Internal TestFlight
    runs-on: macos-26
    timeout-minutes: 75
    env:
      CI: "true"
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      MATCH_GIT_PRIVATE_KEY: ${{ secrets.MATCH_GIT_PRIVATE_KEY }}
      MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
      CLERK_ASSOCIATED_DOMAIN: ${{ secrets.CLERK_ASSOCIATED_DOMAIN }}
      # NOTE: Clerk publishable key dropped (Clerk → Better Auth migration,
      # plan Phase 11). AppConfiguration no longer consumes ClerkPublishableKey
      # after commit ⑧. The CLERK_ASSOCIATED_DOMAIN build setting stays — it
      # feeds `webcredentials:$(CLERK_ASSOCIATED_DOMAIN)` in Jovie.entitlements
      # (still a required Apple App ID capability); rename deferred to the
      # env-cleanup pass in commit ⑫ / Linear follow-up.
      APP_STORE_COMPANY_NAME: ${{ secrets.APP_STORE_COMPANY_NAME }}
      JOVIE_IOS_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      JOVIE_IOS_OBSERVABILITY_ENVIRONMENT: production
      API_BASE_URL: https://jov.ie
      WEB_BASE_URL: https://jov.ie
      IOS_BUILD_NUMBER: ${{ github.event_name == 'workflow_dispatch' && inputs.build_number || github.run_number }}
      TESTFLIGHT_CHANGELOG: ${{ github.event_name == 'workflow_dispatch' && inputs.changelog || format('Internal build {0}', github.sha) }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Set up Ruby
        uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1.314.0
        with:
          ruby-version: "3.1"
          bundler-cache: true

      - name: Validate TestFlight secrets
        shell: bash
        run: bash apps/ios/scripts/validate-testflight-env.sh

      - name: Run iOS tests
        run: bundle exec fastlane ios ios_tests

      - name: Upload internal TestFlight build
        shell: bash
        run: |
          set -euo pipefail
          match_git_private_key="${MATCH_GIT_PRIVATE_KEY:-}"
          if [[ -z "${match_git_private_key//[[:space:]]/}" ]]; then
            unset MATCH_GIT_PRIVATE_KEY
          fi
          bundle exec fastlane ios beta
