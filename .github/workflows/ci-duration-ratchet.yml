name: CI Duration Ratchet

# Nightly p95 gate-duration measurement + SLO guard.
# Measures the rolling p95 wall-clock of recent PR merge-gate CI runs and
# warns when p95 exceeds the committed baseline + margin.
# Baseline lockfile: .github/ci-harness/duration-ratchet.json
# CLI:               node scripts/ci-duration-ratchet.mjs

on:
  schedule:
    # Nightly at 06:00 UTC (low-traffic window)
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      sample_limit:
        description: 'Number of recent CI runs to sample (default: 50)'
        required: false
        default: '50'

permissions:
  contents: read
  actions: read

concurrency:
  group: ci-duration-ratchet
  cancel-in-progress: true

jobs:
  measure:
    name: Measure p95 gate duration + check ratchet
    runs-on: ${{ vars.CI_FAST_RUNNER }}
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Measure p95 and check ratchet
        id: measure
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          SAMPLE_LIMIT: ${{ github.event.inputs.sample_limit || '50' }}
        run: |
          set -euo pipefail

          # Fetch recent completed CI runs on PRs (pull_request event only).
          # We compute wall-clock from run.created_at to run.updated_at for
          # runs where all merge-gate jobs succeeded, which approximates
          # fast-gate wall-clock (the dominant gate tier on PRs).
          RUNS=$(gh api \
            "repos/$GH_REPO/actions/workflows/ci.yml/runs?event=pull_request&status=success&per_page=$SAMPLE_LIMIT" \
            --jq '.workflow_runs[] | {id: .id, created_at: .created_at, updated_at: .updated_at}' \
            2>/dev/null || echo "")

          if [[ -z "$RUNS" ]]; then
            echo "No completed CI runs found; skipping measurement."
            echo "p95_seconds=" >> "$GITHUB_OUTPUT"
            echo "sample_size=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Compute elapsed seconds for each run (created_at → updated_at).
          # jq iterates line-by-line; each line is a JSON object from above.
          DURATIONS=$(echo "$RUNS" | jq -r '
            (.updated_at | fromdateiso8601) - (.created_at | fromdateiso8601)
            | if . < 0 then 0 else . end
          ')

          SAMPLE_SIZE=$(echo "$DURATIONS" | wc -l | tr -d ' ')

          # Compute p95 via sort + head (shell math for percentile).
          SORTED=$(echo "$DURATIONS" | sort -n)
          P95_INDEX=$(echo "$SAMPLE_SIZE * 95 / 100" | bc)
          # Ensure at least index 1
          if [[ "$P95_INDEX" -lt 1 ]]; then P95_INDEX=1; fi
          P95_SECONDS=$(echo "$SORTED" | sed -n "${P95_INDEX}p")

          echo "sample_size=$SAMPLE_SIZE" >> "$GITHUB_OUTPUT"
          echo "p95_seconds=$P95_SECONDS" >> "$GITHUB_OUTPUT"

          echo "Sampled $SAMPLE_SIZE CI runs"
          echo "p95 gate duration: ${P95_SECONDS}s"

      - name: Check ratchet
        id: ratchet
        if: ${{ steps.measure.outputs.p95_seconds != '' }}
        env:
          P95_SECONDS: ${{ steps.measure.outputs.p95_seconds }}
          SAMPLE_SIZE: ${{ steps.measure.outputs.sample_size }}
        run: |
          set -euo pipefail

          node scripts/ci-duration-ratchet.mjs check --p95 "$P95_SECONDS"
          echo "ratchet_ok=true" >> "$GITHUB_OUTPUT"

      - name: Write Job Summary
        if: always()
        env:
          P95_SECONDS: ${{ steps.measure.outputs.p95_seconds }}
          SAMPLE_SIZE: ${{ steps.measure.outputs.sample_size }}
          RATCHET_OK: ${{ steps.ratchet.outputs.ratchet_ok || 'false' }}
        run: |
          set -euo pipefail

          BASELINE_P95=$(node -e "
            const b = JSON.parse(require('fs').readFileSync('.github/ci-harness/duration-ratchet.json','utf8'));
            console.log(b.slo.p95GateSeconds);
          ")
          MARGIN=$(node -e "
            const b = JSON.parse(require('fs').readFileSync('.github/ci-harness/duration-ratchet.json','utf8'));
            console.log((b.slo.marginFraction * 100).toFixed(0));
          ")
          CEILING=$(echo "$BASELINE_P95 * (100 + $MARGIN) / 100" | bc)

          STATUS_ICON="✅"
          STATUS_TEXT="Within SLO"
          if [[ "$RATCHET_OK" != "true" ]]; then
            STATUS_ICON="❌"
            STATUS_TEXT="SLO BREACHED — p95 exceeds ceiling"
          fi
          if [[ -z "${P95_SECONDS:-}" ]]; then
            STATUS_ICON="⚠️"
            STATUS_TEXT="No data — 0 CI runs sampled"
          fi

          {
            echo "## CI Duration Ratchet — p95 Gate SLO"
            echo
            echo "| Metric | Value |"
            echo "| --- | --- |"
            echo "| Baseline p95 | ${BASELINE_P95}s ($(node -e "const s=${BASELINE_P95}; const m=Math.floor(s/60),r=Math.round(s%60); console.log(m>0&&r>0?m+'m '+r+'s':m>0?m+'m':r+'s')")) |"
            echo "| Margin | ${MARGIN}% |"
            echo "| Ceiling | ${CEILING}s |"
            echo "| Measured p95 | ${P95_SECONDS:-N/A}s |"
            echo "| Sample size | ${SAMPLE_SIZE:-0} CI runs |"
            echo "| Status | ${STATUS_ICON} ${STATUS_TEXT} |"
            echo
            echo "**SLO:** p95 gate wall-clock ≤ ${CEILING}s"
            echo
            echo "_Baseline lockfile: \`.github/ci-harness/duration-ratchet.json\`_"
            echo "_Update with: \`node scripts/ci-duration-ratchet.mjs update --p95 <seconds> --sample-size ${SAMPLE_SIZE:-0}\`_"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail when SLO is breached
        if: ${{ steps.measure.outputs.p95_seconds != '' && steps.ratchet.outputs.ratchet_ok != 'true' }}
        run: |
          echo "::error title=CI Duration SLO Breached::p95 gate wall-clock exceeds baseline + 20% margin. See job summary for details and remediation steps."
          exit 1
