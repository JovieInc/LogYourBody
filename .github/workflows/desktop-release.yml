name: desktop-release

# Triggers:
# - Auto on push to main when VERSION or this workflow changes
#   → builds + publishes a production release to GitHub Releases.
#   Desktop-only code changes alone do NOT trigger a release; bump VERSION to
#   ship them. This avoids republishing the same semver and producing an
#   updater no-op when desktop code lands without a version bump.
# - Manual workflow_dispatch lets you target staging or re-run production.
#
# Signing & notarization:
# - Requires GH secrets: MAC_CERTIFICATE_BASE64, MAC_CERTIFICATE_PASSWORD,
#   APPLE_TEAM_ID, APPLE_API_KEY (the .p8 contents), APPLE_API_KEY_ID,
#   APPLE_API_ISSUER.
# - Notarization uses the modern App Store Connect API key flow (no
#   app-specific password). The cert still imports into a temp keychain
#   for codesigning.
# - When secrets are absent (e.g. a fork PR), the macOS build skips signing
#   gracefully and produces an unsigned DMG. Auto-update will not work for
#   unsigned builds; that's by design — they're for sanity checks only.
# - See apps/desktop/SIGNING.md for one-time setup.
# - Canonical prod/staging/local shell matrix: apps/desktop/BUILDS.md (GH-12900).

on:
  push:
    branches: [main]
    paths:
      - "VERSION"
      - ".github/workflows/desktop-release.yml"  # explicit handling for desktop auth allowlist/scheme fixes (e.g. 9870/9812 Clerk wildcard; JOV-3835 CSP-watchdog blank-window fix; GH-12822 per-env callback schemes)
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        options:
          - staging
          - production
        default: production

permissions: {}

concurrency:
  # On push, github.event.inputs.environment is empty → group becomes
  # "desktop-release-production" (the default for push). On manual dispatch,
  # the chosen environment is used. cancel-in-progress=false so a queued
  # production build doesn't get killed by a slow staging build.
  group: desktop-release-${{ github.event.inputs.environment || 'production' }}
  cancel-in-progress: false

jobs:
  build:
    timeout-minutes: 45
    # macOS-only for now. Windows/Linux were removed because we don't ship
    # those binaries today and building them on every release wastes runner
    # time. To re-enable, restore the matrix strategy with the desired OSes.
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      ENVIRONMENT: ${{ github.event.inputs.environment || 'production' }}
      HAS_MAC_SIGNING_CREDENTIALS: ${{ secrets.MAC_CERTIFICATE_BASE64 != '' && secrets.MAC_CERTIFICATE_PASSWORD != '' }}
      HAS_APPLE_API_CREDENTIALS: ${{ secrets.APPLE_API_KEY != '' && secrets.APPLE_API_KEY_ID != '' && secrets.APPLE_API_ISSUER != '' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Enable corepack and prepare pnpm
        run: corepack enable && corepack prepare pnpm@9.15.4 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate staging icon
        if: env.ENVIRONMENT == 'staging'
        run: node apps/desktop/scripts/gen-staging-icon.mjs

      # macOS code signing: import the Developer ID Application cert into a
      # temporary keychain so electron-builder + codesign can find it.
      # If MAC_CERTIFICATE_BASE64 is absent, this step no-ops and the build
      # continues unsigned (electron-builder will warn, not fail).
      - name: Import Apple Developer cert (macOS)
        if: env.HAS_MAC_SIGNING_CREDENTIALS == 'true'
        env:
          MAC_CERTIFICATE_BASE64: ${{ secrets.MAC_CERTIFICATE_BASE64 }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/jovie-build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          CERT_PATH="$RUNNER_TEMP/cert.p12"

          echo "$MAC_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -P "$MAC_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Prepend our keychain to the user's keychain search list so codesign
          # can find the imported identity. Unquoted expansion is intentional —
          # the security CLI takes each keychain path as a separate argument.
          EXISTING_KEYCHAINS=$(security list-keychain -d user | tr -d '"')
          # shellcheck disable=SC2086
          security list-keychain -d user -s "$KEYCHAIN_PATH" $EXISTING_KEYCHAINS
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH" >/dev/null

          # Echo identity for build-log breadcrumb (no secret in output).
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true

          rm -f "$CERT_PATH"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      # Notarization uses App Store Connect API keys instead of an Apple ID +
      # app-specific password. @electron/notarize (which electron-builder
      # invokes) reads APPLE_API_KEY as a filesystem path to the .p8 file, so
      # write the secret contents to a temp file and export the path.
      # Accepts the secret either as raw PEM (-----BEGIN PRIVATE KEY-----) or
      # base64-encoded; whichever Tim pasted works.
      - name: Stage Apple API key (macOS)
        if: env.HAS_APPLE_API_CREDENTIALS == 'true'
        env:
          APPLE_API_KEY_CONTENTS: ${{ secrets.APPLE_API_KEY }}
        run: |
          set -euo pipefail
          KEY_PATH="$RUNNER_TEMP/apple-api-key.p8"
          if printf '%s' "$APPLE_API_KEY_CONTENTS" | grep -q "BEGIN PRIVATE KEY"; then
            printf '%s' "$APPLE_API_KEY_CONTENTS" > "$KEY_PATH"
          else
            printf '%s' "$APPLE_API_KEY_CONTENTS" | base64 --decode > "$KEY_PATH"
          fi
          chmod 600 "$KEY_PATH"
          # Sanity-check the staged key without leaking contents.
          head -1 "$KEY_PATH" | grep -q "BEGIN PRIVATE KEY" || {
            echo "::error::Staged Apple API key is not a valid PEM .p8 file"
            exit 1
          }
          echo "APPLE_API_KEY=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Build desktop app
        env:
          ELECTRON_ENV: ${{ env.ENVIRONMENT }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Apple notarization via App Store Connect API key. All three are
          # required by @electron/notarize when notarize: true is set; if any
          # are missing, electron-builder skips notarization with a warning.
          # APPLE_API_KEY is the path written by "Stage Apple API key" above.
          APPLE_API_KEY: ${{ env.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # CSC_LINK is the alternative to MAC_CERTIFICATE_BASE64 when not
          # using a pre-imported keychain. Left unset; we use the keychain
          # set up above instead.
          CSC_KEYCHAIN: ${{ env.KEYCHAIN_PATH }}
        run: pnpm --filter @jovie/desktop build:${{ env.ENVIRONMENT }}

      - name: Clean up keychain
        if: always() && env.KEYCHAIN_PATH != ''
        run: |
          security delete-keychain "$KEYCHAIN_PATH" || true

      - name: Clean up Apple API key
        if: always() && env.APPLE_API_KEY != ''
        run: |
          rm -f "$APPLE_API_KEY"
