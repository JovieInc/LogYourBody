name: E2E Full Browser Matrix

on:
  schedule:
    # Run every Monday at 6:00 AM UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      test_filter:
        description: 'Test file pattern (leave empty for all tests)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  e2e-full-matrix:
    name: E2E (Chrome + Firefox)
    environment: Preview – jovie
    runs-on: ${{ vars.CI_FAST_RUNNER }}
    timeout-minutes: 60
    env:
      E2E_FULL_MATRIX: '1'
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-node-pnpm

      - name: Create ephemeral Neon database branch
        id: neon-branch
        uses: ./.github/actions/neon-create-branch-with-retry
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: e2e-full-${{ github.run_id }}-${{ matrix.browser }}
          role: neondb_owner
          api_key: ${{ secrets.NEON_API_KEY }}
          expires_in_hours: '3'

      - name: Run database migrations
        run: pnpm --filter=@jovie/web run drizzle:migrate:ci
        env:
          DATABASE_URL: ${{ steps.neon-branch.outputs.db_url }}
          NODE_ENV: test
          GIT_BRANCH: e2e-weekly
          ALLOW_PROD_MIGRATIONS: 'true'

      - name: Cache Playwright Browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ matrix.browser }}-${{ hashFiles('pnpm-lock.yaml', 'playwright.config*.ts') }}
          restore-keys: |
            ${{ runner.os }}-playwright-${{ matrix.browser }}-

      - name: Install Playwright (${{ matrix.browser }})
        run: |
          if [ "${{ matrix.browser }}" = "chromium" ]; then
            pnpm --filter=@jovie/web exec playwright install chromium --with-deps
          else
            pnpm --filter=@jovie/web exec playwright install chromium ${{ matrix.browser }} --with-deps
          fi

      - name: Run E2E tests (${{ matrix.browser }})
        run: |
          cd apps/web
          if [ -n "${{ github.event.inputs.test_filter }}" ]; then
            pnpm playwright test "${{ github.event.inputs.test_filter }}" --project=${{ matrix.browser }} --reporter=line
          else
            # Exclude nightly tests (they run daily in nightly-e2e-tests.yml)
            pnpm playwright test --ignore-snapshots --project=${{ matrix.browser }} --reporter=line
          fi
        env:
          DATABASE_URL: ${{ steps.neon-branch.outputs.db_url }}
          NODE_ENV: test
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          E2E_CLERK_USER_ID: ${{ secrets.E2E_CLERK_USER_ID }}
          E2E_CLERK_USER_USERNAME: ${{ secrets.E2E_CLERK_USER_USERNAME }}
          E2E_CLERK_USER_PASSWORD: ${{ secrets.E2E_CLERK_USER_PASSWORD }}
          FLAGS_SECRET: ${{ secrets.FLAGS_SECRET }}
          # Bypass real Clerk FAPI; Playwright webServer also sets MOCK/PROXY flags.
          # Required so auth.setup + dashboard resolvers do not need sk_live_ keys.
          E2E_USE_TEST_AUTH_BYPASS: '1'
          E2E_TEST_AUTH_PERSONA: creator-ready
          NEXT_PUBLIC_CLERK_MOCK: '1'
          NEXT_PUBLIC_CLERK_PROXY_DISABLED: '1'
          NEXT_PUBLIC_E2E_MODE: '1'

      - name: Upload Playwright Report on Failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-full-${{ matrix.browser }}-report-${{ github.run_id }}
          path: apps/web/playwright-report/
          retention-days: 7

      - name: Upload Test Results on Failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-full-${{ matrix.browser }}-results-${{ github.run_id }}
          path: apps/web/test-results/
          retention-days: 7

      - name: Cleanup Clerk E2E test users
        if: always()
        continue-on-error: true
        run: |
          cd apps/web
          if [[ "${CLERK_SECRET_KEY:-}" != sk_test_* ]]; then
            echo "Skipping Clerk E2E cleanup because CLERK_SECRET_KEY is not a Clerk test secret."
            exit 0
          fi
          pnpm tsx scripts/cleanup-e2e-users.ts --force
        env:
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          DATABASE_URL: ${{ steps.neon-branch.outputs.db_url }}

      - name: Cleanup Neon branch
        if: always()
        continue-on-error: true
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
          BRANCH_NAME: e2e-full-${{ github.run_id }}-${{ matrix.browser }}
        run: |
          if [ -z "$NEON_API_KEY" ] || [ -z "$NEON_PROJECT_ID" ]; then
            echo "Neon credentials missing; skipping branch cleanup."
            exit 0
          fi
          echo "Deleting Neon branch '$BRANCH_NAME'..."
          pnpm dlx neonctl branches delete "$BRANCH_NAME" --project-id "$NEON_PROJECT_ID" || {
            echo "Branch '$BRANCH_NAME' not found or already deleted; ignoring."
          }

  notify:
    name: Notify Results
    needs: [e2e-full-matrix]
    if: ${{ always() && github.event_name == 'schedule' }}
    runs-on: ${{ vars.CI_FAST_RUNNER }}
    steps:
      - name: Slack notification on failure
        if: ${{ needs.e2e-full-matrix.result == 'failure' }}
        uses: 8398a7/action-slack@77eaa4f1c608a7d68b38af4e3f739dcd8cba273e # v3.19.0
        with:
          status: custom
          channel: '#alerts-critical'
          author_name: 'E2E Full Matrix'
          custom_payload: |
            {
              "text": "⚠️ Weekly E2E full browser matrix failed",
              "attachments": [
                {
                  "color": "danger",
                  "fields": [
                    { "title": "Workflow", "value": "E2E Full Browser Matrix (Chrome + Firefox)", "short": true },
                    { "title": "Status", "value": "Failed", "short": true },
                    { "title": "Run", "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>", "short": false }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Slack notification on success
        if: ${{ needs.e2e-full-matrix.result == 'success' }}
        uses: 8398a7/action-slack@77eaa4f1c608a7d68b38af4e3f739dcd8cba273e # v3.19.0
        with:
          status: custom
          channel: '#monitoring'
          author_name: 'E2E Full Matrix'
          custom_payload: |
            {
              "text": "✅ Weekly E2E full browser matrix passed",
              "attachments": [
                {
                  "color": "good",
                  "fields": [
                    { "title": "Workflow", "value": "E2E Full Browser Matrix (Chrome + Firefox)", "short": true },
                    { "title": "Status", "value": "Success", "short": true },
                    { "title": "Run", "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>", "short": false }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
