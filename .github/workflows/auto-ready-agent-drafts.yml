name: Auto-Ready Agent Drafts

# Flips agent-owned draft PRs to "ready for review" once all required checks
# are green and the PR is mergeable. The merge-queue autoenroll workflow then
# picks them up. Without this, draft PRs sit idle until a human flips them.
#
# Fires on CI completion (immediate), PR events, schedule safety net.
# Opt out per-PR with any of: needs-human, hold, gated, fast.

on:
  # Trigger hygiene (#13349): no `synchronize` — every push starts CI, whose
  # completion fires the workflow_run trigger below. A draft's checks can only
  # turn green via a CI completion, so per-push spawns of this fleet-wide scan
  # were pure duplication.
  pull_request:
    types: [ready_for_review, reopened]
  workflow_run:
    workflows: ['CI']
    types: [completed]
  workflow_dispatch:

concurrency:
  group: auto-ready-agent-drafts
  cancel-in-progress: false

permissions:
  pull-requests: write
  contents: read
  checks: read

jobs:
  auto-ready:
    # Fleet controller: use the hosted image contract so `gh` is always
    # available. Some self-hosted fast runners intentionally lack it.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main policy code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # pull_request events otherwise checkout the triggering merge ref,
          # which may not contain the current fleet scripts or tests.
          ref: main
          persist-credentials: false

      - name: Verify GitHub CLI
        run: gh --version

      - name: Auto-ready green agent drafts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          GH_RETRY_ATTEMPTS: 8
          GH_RETRY_MAX_DELAY: 60
        run: bash scripts/auto-ready-agent-drafts.sh
