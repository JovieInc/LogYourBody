# Auto-Resolve PR Conflicts
# Event-driven: triggers when PRs are labeled with needs-conflict-resolution
# or when PRs are opened/synchronized. Zero polling, zero wasted time.

name: Auto-Resolve Conflicts

on:
  pull_request_target:
    types: [labeled, synchronize, opened, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to resolve conflicts for'
        required: true
        type: number

permissions:
  contents: write
  pull-requests: write

# Only one conflict resolution per PR at a time
concurrency:
  group: auto-resolve-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

env:
  GH_REPO: ${{ github.repository }}

jobs:
  resolve-conflicts:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.label.name == 'needs-conflict-resolution') ||
      (github.event_name == 'pull_request_target' && github.event.action == 'opened') ||
      (github.event_name == 'pull_request_target' && github.event.action == 'reopened')
    name: Resolve Conflicts
    runs-on: ${{ vars.CI_FAST_RUNNER }}
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          sparse-checkout: |
            .github/scripts/resolve-pr-conflict.mjs
          sparse-checkout-cone-mode: false
          fetch-depth: 0

      - name: Resolve conflicts
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
        run: |
          echo "Resolving conflicts for PR #${PR_NUMBER}"
          node .github/scripts/resolve-pr-conflict.mjs --pr="$PR_NUMBER" --apply 2>&1

      - name: Comment on PR on failure
        if: steps.resolve.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
        run: |
          gh pr comment "$PR_NUMBER" --body "🤖 Auto-resolve attempted but found real merge conflicts that couldn't be auto-merged. See the workflow run for details."
