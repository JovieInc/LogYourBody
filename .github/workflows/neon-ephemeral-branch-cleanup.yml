name: Neon Ephemeral Branch Cleanup

on:
  pull_request:
    types: [closed]

permissions:
  contents: read

concurrency:
  group: neon-branch-cleanup-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  delete-neon-branch:
    name: Delete Neon branch for closed PR
    runs-on: ${{ vars.CI_FAST_RUNNER }}
    timeout-minutes: 5
    env:
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
      NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}

    steps:
      - name: Validate Neon configuration
        id: validate
        run: |
          if [ -z "${NEON_API_KEY}" ] || [ -z "${NEON_PROJECT_ID}" ]; then
            echo "Neon API credentials missing; skipping cleanup." >&2
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Compute sanitized Neon branch name
        id: sanitize
        if: steps.validate.outputs.skip != 'true'
        env:
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          RAW="$PR_HEAD_REF"
          # Reuse the same sanitization logic as the neon-db job in ci.yml
          SANITIZED=$(echo "$RAW" | tr '[:upper:]' '[:lower:]' \
            | sed -E 's|/|-|g; s|[^a-z0-9._-]|-|g; s/-{2,}/-/g; s/^-+//; s/-+$//')

          if [ -z "$SANITIZED" ]; then
            echo "No sanitized branch name derived from '$RAW'; skipping." >&2
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Neon branch base name (without run suffix): $SANITIZED"
            echo "name=$SANITIZED" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Guard against deleting long-lived Neon branches
        id: guard
        if: steps.sanitize.outputs.skip != 'true'
        run: |
          NAME="${{ steps.sanitize.outputs.name }}"
          case "$NAME" in
            main)
              echo "Protected Neon branch '$NAME'; skipping delete." >&2
              echo "skip=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Ephemeral Neon branch '$NAME' eligible for cleanup."
              echo "skip=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Setup pnpm
        if: steps.guard.outputs.skip != 'true'
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 9

      - name: List and delete matching Neon branches
        if: steps.guard.outputs.skip != 'true'
        run: |
          BASE_NAME="${{ steps.sanitize.outputs.name }}"
          echo "Looking for Neon branches matching pattern: ${BASE_NAME}-*"

          BRANCHES_JSON=$(pnpm dlx neonctl branches list \
            --project-id "$NEON_PROJECT_ID" \
            --output json 2>/dev/null || echo "[]")

          MATCHING_BRANCHES=$(echo "$BRANCHES_JSON" | jq -r --arg base "$BASE_NAME" '
            (if type == "array" then . else (.branches // []) end)
            | .[]
            | select(.name | startswith($base + "-"))
            | .name
          ')

          EXACT_MATCH=$(echo "$BRANCHES_JSON" | jq -r --arg name "$BASE_NAME" '
            (if type == "array" then . else (.branches // []) end)
            | .[]
            | select(.name == $name)
            | .name
          ')

          if [ -z "$MATCHING_BRANCHES" ] && [ -z "$EXACT_MATCH" ]; then
            echo "No matching Neon branches found for '$BASE_NAME'"
            exit 0
          fi
          DELETED_COUNT=0
          for branch in $MATCHING_BRANCHES; do
            echo "Deleting Neon branch: $branch"
            if pnpm dlx neonctl branches delete "$branch" --project-id "$NEON_PROJECT_ID" 2>/dev/null; then
              echo "  Deleted successfully"
              DELETED_COUNT=$((DELETED_COUNT + 1))
            else
              echo "  Failed to delete (may already be deleted)"
            fi
          done

          if [ -n "$EXACT_MATCH" ]; then
            echo "Deleting exactly-matching Neon branch: $EXACT_MATCH"
            if pnpm dlx neonctl branches delete "$EXACT_MATCH" --project-id "$NEON_PROJECT_ID" 2>/dev/null; then
              echo "  Deleted successfully"
              DELETED_COUNT=$((DELETED_COUNT + 1))
            else
              echo "  Failed to delete (may already be deleted)"
            fi
          fi

          echo "Total branches deleted: $DELETED_COUNT"