name: Golden Principles

on:
  pull_request:
    branches: [main, 'integration/**']
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: golden-principles-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  golden-principles:
    name: Golden Principles
    runs-on: ${{ vars.CI_FAST_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 5
    env:
      PR_BODY: ${{ github.event.pull_request.body || '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Run data-driven enforcer
        run: |
          set -euo pipefail
          printf '%s' "$PR_BODY" > "$RUNNER_TEMP/pr-body.md"
          python3 .github/scripts/golden-principles/check.py \
            --base "origin/${GITHUB_BASE_REF:-main}" \
            --head HEAD \
            --pr-body-file "$RUNNER_TEMP/pr-body.md"
