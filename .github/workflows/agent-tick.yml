# Agent Tick — consolidated monitoring cron
#
# PURPOSE:
# Consolidates 8 individual cron workflows that ran independently at */5-*/15
# intervals into a single schedule. This reduces GitHub Actions concurrency
# slot contention with PR CI jobs. Each monitoring function is a parallel job.
#
# SCHEDULE: every 10 minutes (middle ground between faster */5 and slower */15)
#
# CONSOLIDATED WORKFLOWS (removed their cron schedules; kept workflow_dispatch):
#   agent-landing-sweep      — sweep eligible agent PRs into the merge queue
#   auto-ready-agent-drafts  — flip green agent draft PRs to "ready for review"
#   cost-anomaly-gate        — detect production event volume anomalies
#   github-ai-dispatcher     — dispatch agent-ready issues to the orchestrator
#   main-ci-health-monitor   — detect stalled/failing CI on main
#   neon-scheduled-cleanup   — clean up orphaned Neon database branches
#   runner-health-monitor    — detect self-hosted runner outage, flip fallback
#   synthetic-monitoring     — production synthetic auth/ui/onboarding checks
#
# See tracking issue: #13629

name: Agent Tick

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions: {}

concurrency:
  group: agent-tick
  cancel-in-progress: false

jobs:
  # --------------------------------------------------------------------------
  # JOB: landing-sweep
  # Formerly: agent-landing-sweep.yml (every 15 min)
  # --------------------------------------------------------------------------
  landing-sweep:
    name: Landing Sweep
    runs-on: ${{ vars.CI_FAST_RUNNER }}
    timeout-minutes: 8
    permissions:
      contents: read
      pull-requests: write
      statuses: read

    steps:
      - name: Generate Jovie Bot token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.JOVIE_BOT_APP_ID }}
          private-key: ${{ secrets.JOVIE_BOT_PRIVATE_KEY }}

      - name: Checkout main policy code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          persist-credentials: false

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Sweep and land eligible agent PRs
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          DRY_RUN: 'false'
        run: |
          set -euo pipefail
          READY_THRESHOLD=$(node scripts/ci-merge-queue-check.mjs max-queue-depth)

          echo "=== Agent Landing Sweep ==="
          echo "Repository: $GH_REPO"

          ALL_PRS=$(gh api --paginate --slurp "repos/$GH_REPO/pulls?state=open&per_page=100" \
            | jq '[.[][] | select(.draft == false) | {
                number: .number,
                title: .title,
                head_ref: .head.ref,
                head_sha: .head.sha,
                labels: [.labels[].name],
                queued: ([.labels[].name] | any(. == "merge-queue"))
              }]')

          TOTAL=$(echo "$ALL_PRS" | jq 'length')
          echo "Open non-draft PRs: $TOTAL"

          AGENT_PRS=$(echo "$ALL_PRS" | jq '[.[] | select(
            (.head_ref | test("^(linear/|claude/|codegen-bot/|codex/)"; "i"))
            or (.head_ref | test("(^|/)jov-[0-9]+"; "i"))
          )]')

          AGENT_TOTAL=$(echo "$AGENT_PRS" | jq 'length')
          echo "Agent PRs (non-draft): $AGENT_TOTAL"

          if [[ "$AGENT_TOTAL" -eq 0 ]]; then
            echo "No open agent PRs to sweep."
            exit 0
          fi

          READY_COUNT=$(echo "$ALL_PRS" | jq '[.[] | select(.queued == true)] | length')
          echo "PRs already in merge queue: $READY_COUNT / $READY_THRESHOLD"

          if [[ "$READY_COUNT" -ge "$READY_THRESHOLD" ]]; then
            echo "Queue pressure is high ($READY_COUNT / $READY_THRESHOLD). Skipping sweep."
            exit 0
          fi

          LANDED=0
          SKIPPED=0

          while IFS= read -r PR; do
            PR_NUMBER=$(echo "$PR" | jq -r '.number')
            PR_TITLE=$(echo "$PR" | jq -r '.title')
            PR_SHA=$(echo "$PR" | jq -r '.head_sha')
            PR_BRANCH=$(echo "$PR" | jq -r '.head_ref')
            PR_QUEUED=$(echo "$PR" | jq -r '.queued')
            LABELS=$(echo "$PR" | jq -r '[.labels[]] | join(",")')

            echo ""
            echo "--- PR #$PR_NUMBER: $PR_TITLE ---"

            if [[ "$PR_QUEUED" == "true" ]]; then
              echo "Already in merge queue. Skipping."; SKIPPED=$((SKIPPED + 1)); continue
            fi

            if echo "$LABELS" | grep -q "needs-human"; then
              echo "Has needs-human label. Skipping."; SKIPPED=$((SKIPPED + 1)); continue
            fi

            if ! echo "$LABELS" | grep -qE "(^|,)(automerge|auto-approved|ai:ready-to-merge)(,|$)"; then
              echo "No auto-landing label. Skipping."; SKIPPED=$((SKIPPED + 1)); continue
            fi

            CI_PR_READY=$(gh api --paginate --slurp "repos/$GH_REPO/commits/$PR_SHA/check-runs?per_page=100" 2>/dev/null \
              | jq -r '[.[].check_runs[] | select(.name == "PR Ready")] | sort_by(.completed_at) | last | .conclusion // "pending"' || echo "unknown")
            if [[ "$CI_PR_READY" != "success" ]]; then
              echo "CI PR Ready is $CI_PR_READY. Skipping."; SKIPPED=$((SKIPPED + 1)); continue
            fi

            CR_STATE=$(gh api --paginate --slurp "repos/$GH_REPO/pulls/$PR_NUMBER/reviews?per_page=100" 2>/dev/null \
              | jq -r '[.[][] | select(.user.login == "coderabbitai[bot]")] | sort_by(.submitted_at) | last | .state // "none"')
            if [[ "$CR_STATE" == "CHANGES_REQUESTED" ]]; then
              echo "CodeRabbit blocking. Skipping."; SKIPPED=$((SKIPPED + 1)); continue
            fi

            if ! CHANGED_FILES=$(gh pr diff "$PR_NUMBER" --repo "$GH_REPO" --name-only 2>/dev/null); then
              echo "Could not fetch changed files. Skipping."; SKIPPED=$((SKIPPED + 1)); continue
            fi

            printf '%s\n' "$CHANGED_FILES" > "$RUNNER_TEMP/agent-landing-$PR_NUMBER-changed-files.txt"
            node scripts/ci-harness.mjs classify-risk --files "$RUNNER_TEMP/agent-landing-$PR_NUMBER-changed-files.txt" \
              > "$RUNNER_TEMP/agent-landing-$PR_NUMBER-ci-risk.json"

            if [[ "$(jq -r '.blocksUnattendedAutoMerge' "$RUNNER_TEMP/agent-landing-$PR_NUMBER-ci-risk.json")" == "true" ]]; then
              echo "CI harness blocks unattended auto-merge. Skipping."; SKIPPED=$((SKIPPED + 1)); continue
            fi

            if [[ $((READY_COUNT + LANDED)) -ge "$READY_THRESHOLD" ]]; then
              echo "Queue pressure threshold reached. Stopping."; break
            fi

            echo "All gates passed for PR #$PR_NUMBER. Adding to Graphite merge queue..."
            if gh pr edit "$PR_NUMBER" --add-label "merge-queue"; then
              echo "Added PR #$PR_NUMBER to merge queue."; LANDED=$((LANDED + 1))
            else
              echo "::warning::Failed to add merge-queue label to PR #$PR_NUMBER"
              SKIPPED=$((SKIPPED + 1))
            fi
          done < <(echo "$AGENT_PRS" | jq -c '.[]')

          echo ""
          echo "=== Sweep complete: landed=$LANDED skipped=$SKIPPED ==="

  # --------------------------------------------------------------------------
  # JOB: auto-ready
  # Formerly: auto-ready-agent-drafts.yml (every 15 min + events)
  # --------------------------------------------------------------------------
  auto-ready:
    name: Auto-Ready Agent Drafts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pull-requests: write
      contents: read
      checks: read

    steps:
      - name: Checkout main policy code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          persist-credentials: false

      - name: Verify GitHub CLI
        run: gh --version

      - name: Auto-ready green agent drafts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          GH_RETRY_ATTEMPTS: 8
          GH_RETRY_MAX_DELAY: 60
        run: bash scripts/auto-ready-agent-drafts.sh

  # --------------------------------------------------------------------------
  # JOB: cost-anomaly
  # Formerly: cost-anomaly-gate.yml (every 15 min)
  # --------------------------------------------------------------------------
  cost-anomaly:
    name: Cost Anomaly Gate
    runs-on: ${{ vars.CI_FAST_RUNNER }}
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write

    env:
      DRY_RUN: 'true'
      THRESHOLD_MULTIPLIER: '5'
      ABSOLUTE_FLOOR: '1000'
      LOOKBACK_MINUTES: '60'
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - name: Query current event volume
        id: current
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          END_EPOCH=$(date +%s)
          START_EPOCH=$((END_EPOCH - LOOKBACK_MINUTES * 60))
          START_ISO=$(date -u -d "@$START_EPOCH" '+%Y-%m-%dT%H:%M:%S')
          END_ISO=$(date -u -d "@$END_EPOCH" '+%Y-%m-%dT%H:%M:%S')
          echo "Current window: $START_ISO to $END_ISO (${LOOKBACK_MINUTES} min)"
          STATS_RESPONSE=$(curl -sS \
            -H "Authorization: Bearer $SENTRY_AUTH_TOKEN" \
            "https://sentry.io/api/0/organizations/$SENTRY_ORG/events-stats/?project=$SENTRY_PROJECT&field=count()&start=$START_ISO&end=$END_ISO&interval=1m" \
            2>/dev/null || echo '{"data":[]}')
          COUNT=$(echo "$STATS_RESPONSE" | jq '[.data[]?[1][]?.count // 0] | add // 0' 2>/dev/null || echo "0")
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Query baseline event volume (same hour-of-week, prior 4 weeks)
        id: baseline
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          NOW_EPOCH=$(date +%s); TOTAL=0; SAMPLES=0
          for WEEKS_AGO in 1 2 3 4; do
            END_EPOCH=$((NOW_EPOCH - WEEKS_AGO * 7 * 86400))
            START_EPOCH=$((END_EPOCH - LOOKBACK_MINUTES * 60))
            START_ISO=$(date -u -d "@$START_EPOCH" '+%Y-%m-%dT%H:%M:%S')
            END_ISO=$(date -u -d "@$END_EPOCH" '+%Y-%m-%dT%H:%M:%S')
            STATS_RESPONSE=$(curl -sS \
              -H "Authorization: Bearer $SENTRY_AUTH_TOKEN" \
              "https://sentry.io/api/0/organizations/$SENTRY_ORG/events-stats/?project=$SENTRY_PROJECT&field=count()&start=$START_ISO&end=$END_ISO&interval=1m" \
              2>/dev/null || echo '{"data":[]}')
            SAMPLE=$(echo "$STATS_RESPONSE" | jq '[.data[]?[1][]?.count // 0] | add // 0' 2>/dev/null || echo "0")
            TOTAL=$((TOTAL + SAMPLE)); SAMPLES=$((SAMPLES + 1))
          done
          AVG=$((SAMPLES > 0 ? TOTAL / SAMPLES : 0))
          echo "average=$AVG" >> "$GITHUB_OUTPUT"

      - name: Evaluate anomaly
        id: evaluate
        run: |
          CURRENT="${{ steps.current.outputs.count }}"
          BASELINE="${{ steps.baseline.outputs.average }}"
          MULTIPLIED=$((BASELINE * THRESHOLD_MULTIPLIER))
          THRESHOLD=$((MULTIPLIED > ABSOLUTE_FLOOR ? MULTIPLIED : ABSOLUTE_FLOOR))
          echo "Current: $CURRENT | Baseline: $BASELINE | Threshold: $THRESHOLD"
          if [[ "$CURRENT" -gt "$THRESHOLD" ]]; then
            RATIO=$((BASELINE > 0 ? CURRENT * 100 / BASELINE : 0))
            echo "status=anomaly" >> "$GITHUB_OUTPUT"
            echo "reason=Spike: ${CURRENT} vs baseline ${BASELINE}" >> "$GITHUB_OUTPUT"
          else
            echo "status=normal" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout for rollback
        if: steps.evaluate.outputs.status == 'anomaly' && env.DRY_RUN == 'false'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js and pnpm for rollback
        if: steps.evaluate.outputs.status == 'anomaly' && env.DRY_RUN == 'false'
        uses: ./.github/actions/setup-node-pnpm

      - name: Auto-rollback
        id: rollback
        if: steps.evaluate.outputs.status == 'anomaly' && env.DRY_RUN == 'false'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if ./node_modules/.bin/vercel rollback --yes --token "$VERCEL_TOKEN" 2>&1; then
            echo "rollback_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "rollback_status=failed" >> "$GITHUB_OUTPUT"
          fi

      - name: Slack alert
        if: steps.evaluate.outputs.status == 'anomaly' && env.SLACK_WEBHOOK_URL != ''
        run: |
          HEADLINE="$([ "$DRY_RUN" = "true" ] && echo "🟡 Cost Anomaly (DRY RUN)" || echo "🚨 Cost Anomaly — Rollback Triggered")"
          curl -sS -X POST "$SLACK_WEBHOOK_URL" -H 'Content-Type: application/json' \
            -d "$(jq -n --arg h "$HEADLINE" --arg c "${{ steps.current.outputs.count }}" --arg b "${{ steps.baseline.outputs.average }}" '{text: $h, attachments: [{color: "danger", fields: [{title: "Current", value: $c, short: true}, {title: "Baseline", value: $b, short: true}]}]}')" || true

      - name: Open GitHub issue
        if: steps.evaluate.outputs.status == 'anomaly' && env.DRY_RUN == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create cost-monitoring --description "Cost monitoring" --color "e4e669" 2>/dev/null || true
          gh label create incident --description "Production incident" --color "d93f0b" 2>/dev/null || true
          gh issue create --title "Cost anomaly auto-rollback: $(date -u +%Y-%m-%dT%H:%MZ)" \
            --label "cost-monitoring,incident" \
            --body "Current: ${{ steps.current.outputs.count }}\nBaseline: ${{ steps.baseline.outputs.average }}\nSee workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true

  # --------------------------------------------------------------------------
  # JOB: dispatch
  # Formerly: github-ai-dispatcher.yml (every 15 min)
  # --------------------------------------------------------------------------
  dispatch:
    name: Dispatch Ready Issues
    runs-on: ${{ vars.CI_FAST_RUNNER }}
    timeout-minutes: 10
    permissions:
      contents: read
      issues: read
      actions: write
    env:
      MAX_DISPATCH: '2'
      MAX_OPEN_AGENT_PRS: '5'

    steps:
      - name: Generate Jovie Bot token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.JOVIE_BOT_APP_ID }}
          private-key: ${{ secrets.JOVIE_BOT_PRIVATE_KEY }}

      - name: Checkout tracker helpers
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          sparse-checkout: |
            scripts/lib/tracker.mjs
            scripts/github-query-todo.mjs
          sparse-checkout-cone-mode: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Find capacity and dispatch candidates
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          OPEN_AGENT_PRS=$(gh api "repos/${{ github.repository }}/pulls?state=open&per_page=100" \
            | jq '[.[] | select(.head.ref | test("^(codex|codegen-bot|linear|claude)/") or test("^[^/]+/jov-[0-9]+-"; "i"))] | length')
          CAPACITY=$((MAX_OPEN_AGENT_PRS - OPEN_AGENT_PRS))
          if [[ "$CAPACITY" -le 0 ]]; then
            echo "No dispatch capacity: $OPEN_AGENT_PRS / $MAX_OPEN_AGENT_PRS agent PRs are open"; exit 0
          fi
          MAX_DISPATCH_VAL=$((MAX_DISPATCH > CAPACITY ? CAPACITY : MAX_DISPATCH))
          echo "Dispatch capacity: $MAX_DISPATCH_VAL issue(s)"
          CANDIDATES=$(node scripts/github-query-todo.mjs | head -n "$MAX_DISPATCH_VAL" || true)
          if [[ -z "$CANDIDATES" ]]; then echo "No dispatchable issues with label 'agent-ready'"; exit 0; fi
          printf '%s\n' "$CANDIDATES" | while IFS=$'\t' read -r issue_ref _labels title; do
            [[ -z "$issue_ref" ]] && continue
            ISSUE_NUMBER="${issue_ref#\#}"
            echo "Candidate: #${ISSUE_NUMBER} - ${title}"
            EXISTING_PR_COUNT=$(gh pr list --state open --limit 100 --json number,title,body \
              | jq --arg num "$ISSUE_NUMBER" 'map(select(((.title // "") + "\n" + (.body // "")) | test("Fixes #" + $num + "\\b"; "i") or test("Closes #" + $num + "\\b"; "i"))) | length')
            if [[ "$EXISTING_PR_COUNT" != "0" ]]; then echo "Open PR already references #${ISSUE_NUMBER}; skipping"; continue; fi
            if ! gh workflow run github-ai-orchestrator.yml --ref main -f issue_number="$ISSUE_NUMBER"; then
              echo "::warning::Workflow dispatch failed for #${ISSUE_NUMBER}"; continue
            fi
            echo "Dispatched orchestrator for #${ISSUE_NUMBER}"
          done

  # --------------------------------------------------------------------------
  # JOB: main-ci-health
  # Formerly: main-ci-health-monitor.yml (every ~15 min)
  # --------------------------------------------------------------------------
  main-ci-health:
    name: Main CI Health
    runs-on: ${{ vars.CI_FAST_RUNNER }}
    timeout-minutes: 8
    permissions:
      actions: read
      contents: read
      pull-requests: read
    outputs:
      should_alert: ${{ steps.evaluate.outputs.should_alert }}
      failed_run_id: ${{ steps.evaluate.outputs.failed_run_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Evaluate main CI health
        id: evaluate
        uses: ./.github/actions/eval-main-health

      - name: Slack alert (main CI unhealthy)
        if: ${{ steps.evaluate.outputs.should_alert == 'true' && env.SLACK_WEBHOOK_URL != '' }}
        env:
          DETAILS: ${{ steps.evaluate.outputs.details }}
          SUMMARY: ${{ steps.evaluate.outputs.summary }}
          RUN_URL: ${{ steps.evaluate.outputs.run_url }}
          GH_REPOSITORY: ${{ github.repository }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -sS -X POST -H 'Content-type: application/json' \
            -d "$(jq -n --arg s "$SUMMARY" --arg d "$DETAILS" --arg u "$RUN_URL" '{text: "🚨 Main CI Health Issue", attachments: [{color: "danger", fields: [{title: "Summary", value: $s}, {title: "Details", value: $d}, {title: "Run", value: $u}]}]}')" \
            "$SLACK_WEBHOOK_URL"

      - name: Fail job when unhealthy
        if: ${{ steps.evaluate.outputs.should_alert == 'true' }}
        run: |
          echo "${{ steps.evaluate.outputs.summary }}"
          echo "${{ steps.evaluate.outputs.details }}"
          exit 1

  main-ci-auto-rerun:
    name: Auto-Rerun Failed Deploy
    needs: main-ci-health
    if: ${{ always() && needs.main-ci-health.outputs.should_alert == 'true' && needs.main-ci-health.outputs.failed_run_id != '' }}
    runs-on: ${{ vars.CI_FAST_RUNNER }}
    permissions:
      actions: write
    steps:
      - name: Auto-rerun failed deploy (self-healing)
        env:
          GH_TOKEN: ${{ github.token }}
          FAILED_RUN_ID: ${{ needs.main-ci-health.outputs.failed_run_id }}
          GH_REPO: ${{ github.repository }}
        run: |
          ATTEMPT=$(gh api "repos/$GH_REPO/actions/runs/$FAILED_RUN_ID" --jq '.run_attempt' 2>/dev/null || echo "1")
          if [ "$ATTEMPT" -gt 1 ]; then
            echo "Run $FAILED_RUN_ID already re-attempted (attempt $ATTEMPT), skipping — autofix will handle."; exit 0
          fi
          echo "Re-running failed CI run $FAILED_RUN_ID (failed jobs only)..."
          gh run rerun "$FAILED_RUN_ID" --failed || echo "Auto-rerun failed"

  # --------------------------------------------------------------------------
  # JOB: neon-cleanup
  # Formerly: neon-scheduled-cleanup.yml (every 15 min)
  # --------------------------------------------------------------------------
  neon-cleanup:
    name: Neon Branch Cleanup
    runs-on: ${{ vars.CI_FAST_RUNNER }}
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Run Neon branch cleanup
        uses: ./.github/actions/neon-branch-cleanup
        with:
          neon_api_key: ${{ secrets.NEON_API_KEY }}
          neon_project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_limit: '10'
          protected_branches: 'main,development,preview,br-main,br-production'
          cleanup_threshold: '5'
          minimum_branch_age_minutes: '45'

  # --------------------------------------------------------------------------
  # JOB: runner-health
  # Formerly: runner-health-monitor.yml (every 5 min)
  # --------------------------------------------------------------------------
  runner-health:
    name: Runner Health
    runs-on: ${{ vars.CI_FAST_RUNNER }}
    timeout-minutes: 2
    permissions:
      contents: read
      actions: write
    env:
      GH_TOKEN: ${{ github.token }}
      TARGET_VARIABLE: CI_FAST_RUNNER
      OFFLINE_TARGET: ubuntu-latest
      ONLINE_TARGET: jovie-runner

    steps:
      - name: Detect self-hosted runner label drift
        run: |
          set -euo pipefail
          OFFENDERS=$(gh api repos/JovieInc/Jovie/actions/runners --jq \
            '[.runners[] | select([.labels[].name] | any(. == "ubuntu-latest" or . == "macos-latest" or . == "windows-latest")) | {name: .name, labels: [.labels[].name]}]')
          COUNT=$(echo "$OFFENDERS" | jq length)
          if [ "$COUNT" -gt 0 ]; then
            DETAIL=$(echo "$OFFENDERS" | jq -r '[.[] | "\(.name) [\(.labels | join(","))]"] | join("; ")')
            echo "::error::Runner label drift: $COUNT runner(s) with forbidden labels: $DETAIL"
            exit 1
          fi
          echo "OK: no runner label drift detected."

      - name: Query runner status
        id: runners
        run: |
          set -euo pipefail
          RUNNERS=$(gh api repos/JovieInc/Jovie/actions/runners --jq \
            '[.runners[] | select(.labels[].name == "jovie-runner") | {name: .name, status: .status, busy: .busy}]')
          TOTAL=$(echo "$RUNNERS" | jq length)
          ONLINE=$(echo "$RUNNERS" | jq '[.[] | select(.status == "online")] | length')
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "online=$ONLINE" >> "$GITHUB_OUTPUT"
          if [ "$ONLINE" -eq 0 ]; then echo "health=down" >> "$GITHUB_OUTPUT"
          elif [ "$ONLINE" -ge 1 ]; then echo "health=up" >> "$GITHUB_OUTPUT"; fi

      - name: Flip to GitHub-hosted fallback if runners are down
        if: steps.runners.outputs.health == 'down'
        run: |
          set -euo pipefail
          CURRENT=$(gh api repos/JovieInc/Jovie/actions/variables/CI_FAST_RUNNER --jq '.value' 2>/dev/null || echo "")
          if [ "$CURRENT" = "ubuntu-latest" ]; then echo "Already on fallback."; exit 0; fi
          CONSECUTIVE_FILE="${{ runner.temp }}/runner-down-count"
          COUNT=0; [ -f "$CONSECUTIVE_FILE" ] && COUNT=$(cat "$CONSECUTIVE_FILE")
          COUNT=$((COUNT + 1)); echo "$COUNT" > "$CONSECUTIVE_FILE"
          FLAP_THRESHOLD=2
          if [ "$COUNT" -lt "$FLAP_THRESHOLD" ]; then echo "First detection. Need $((FLAP_THRESHOLD - COUNT)) more."; exit 0; fi
          echo "Runners offline for $COUNT consecutive checks. Flipping CI_FAST_RUNNER → ubuntu-latest..."
          gh api -X PATCH repos/JovieInc/Jovie/actions/variables/CI_FAST_RUNNER -f name=CI_FAST_RUNNER -f value=ubuntu-latest

      - name: Restore self-hosted runners when they come back
        if: steps.runners.outputs.health == 'up'
        run: |
          set -euo pipefail
          CURRENT=$(gh api repos/JovieInc/Jovie/actions/variables/CI_FAST_RUNNER --jq '.value' 2>/dev/null || echo "")
          if [ "$CURRENT" = "jovie-runner" ]; then echo "Already on self-hosted."; exit 0; fi
          CONSECUTIVE_FILE="${{ runner.temp }}/runner-up-count"
          COUNT=0; [ -f "$CONSECUTIVE_FILE" ] && COUNT=$(cat "$CONSECUTIVE_FILE")
          COUNT=$((COUNT + 1)); echo "$COUNT" > "$CONSECUTIVE_FILE"
          FLAP_THRESHOLD=2
          if [ "$COUNT" -lt "$FLAP_THRESHOLD" ]; then echo "First recovery check. Need $((FLAP_THRESHOLD - COUNT)) more."; exit 0; fi
          echo "Runners back for $COUNT consecutive checks. Restoring CI_FAST_RUNNER → jovie-runner..."
          gh api -X PATCH repos/JovieInc/Jovie/actions/variables/CI_FAST_RUNNER -f name=CI_FAST_RUNNER -f value=jovie-runner

  # --------------------------------------------------------------------------
  # JOB: synthetic-monitoring
  # Formerly: synthetic-monitoring.yml (every 15 min during business hours)
  # --------------------------------------------------------------------------
  synthetic-monitoring:
    name: Production Synthetic Monitoring
    runs-on: ${{ vars.CI_FAST_RUNNER }}
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Cache Playwright Browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml', 'playwright.config*.ts') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers (chromium only)
        run: pnpm --filter=@jovie/web exec playwright install --with-deps chromium

      - name: Install Doppler CLI
        run: |
          sudo apt-get update && sudo apt-get install -y apt-transport-https ca-certificates curl gnupg
          curl -sLf --retry 3 --tlsv1.2 --proto "=https" 'https://packages.doppler.com/public/cli/gpg.DE2A7741A397C129.key' | sudo gpg --dearmor -o /usr/share/keyrings/doppler-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/doppler-archive-keyring.gpg] https://packages.doppler.com/public/cli/deb/debian any-version main" | sudo tee /etc/apt/sources.list.d/doppler-cli.list
          sudo apt-get update && sudo apt-get install -y doppler

      - name: Check production signup readiness
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_PRD }}
        run: |
          doppler run -- pnpm --filter=@jovie/web exec tsx scripts/check-signup-readiness.ts --target=prd --source=env

      - name: SEO/AEO ratchet — live robots.txt + sitemap.xml
        env:
          BASE_URL: https://jov.ie
        run: pnpm --filter=@jovie/web run seo:ratchet:live

      - name: Run Layer A Auth UI Canary
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_PRD }}
          BASE_URL: https://jov.ie
          PLAYWRIGHT_TEST_BASE_URL: https://jov.ie
          E2E_SKIP_WEB_SERVER: '1'
          E2E_SYNTHETIC_MODE: 'true'
          E2E_ENVIRONMENT: production
          SYNTHETIC_PLAYWRIGHT_JSON_OUTPUT_FILE: test-results/synthetic-auth-ui-results.json
        run: |
          doppler run -- pnpm --filter=@jovie/web exec playwright test tests/e2e/synthetic-auth-ui.spec.ts --config=playwright.synthetic.config.ts --project=chromium-synthetic --output=test-results/synthetic-auth-ui
        continue-on-error: true

      - name: Run Golden Path Health + Performance
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_PRD }}
          BASE_URL: https://jov.ie
          PLAYWRIGHT_TEST_BASE_URL: https://jov.ie
          E2E_SKIP_WEB_SERVER: '1'
          E2E_SYNTHETIC_MODE: 'true'
          E2E_ENVIRONMENT: production
          SYNTHETIC_PLAYWRIGHT_JSON_OUTPUT_FILE: test-results/synthetic-golden-path-results.json
        run: |
          doppler run -- pnpm --filter=@jovie/web exec playwright test tests/e2e/synthetic-golden-path.spec.ts --config=playwright.synthetic.config.ts --project=chromium-synthetic --output=test-results/synthetic-golden-path
        continue-on-error: true

      - name: Run Onboarding Robot Full Synthetic
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_PRD }}
          BASE_URL: https://jov.ie
          PLAYWRIGHT_TEST_BASE_URL: https://jov.ie
          E2E_SKIP_WEB_SERVER: '1'
          E2E_SYNTHETIC_MODE: 'true'
          E2E_ENVIRONMENT: production
          SYNTHETIC_PLAYWRIGHT_JSON_OUTPUT_FILE: test-results/onboarding-robot-full-results.json
        run: |
          doppler run -- pnpm --filter=@jovie/web exec playwright test tests/e2e/onboarding-robot.full.spec.ts --config=playwright.synthetic.config.ts --project=chromium-synthetic --output=test-results/onboarding-robot-full
        continue-on-error: true

      - name: Run Legacy OTP Signup Canary
        if: ${{ vars.E2E_PROD_LEGACY_CANARY != '0' }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_PRD }}
          BASE_URL: https://jov.ie
          PLAYWRIGHT_TEST_BASE_URL: https://jov.ie
          E2E_SKIP_WEB_SERVER: '1'
          E2E_SYNTHETIC_MODE: 'true'
          E2E_ENVIRONMENT: production
          SYNTHETIC_PLAYWRIGHT_JSON_OUTPUT_FILE: test-results/synthetic-legacy-otp-results.json
        run: |
          doppler run -- pnpm --filter=@jovie/web exec playwright test tests/e2e/synthetic-legacy-otp.spec.ts --config=playwright.synthetic.config.ts --project=chromium-synthetic --output=test-results/synthetic-legacy-otp
        continue-on-error: true

      - name: Run Public Profile Smoke Test
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_PRD }}
          BASE_URL: https://jov.ie
          PLAYWRIGHT_TEST_BASE_URL: https://jov.ie
          E2E_SKIP_WEB_SERVER: '1'
          E2E_SYNTHETIC_MODE: 'true'
          E2E_ENVIRONMENT: production
          SYNTHETIC_PLAYWRIGHT_JSON_OUTPUT_FILE: test-results/public-profile-smoke-results.json
        run: |
          doppler run -- pnpm --filter=@jovie/web exec playwright test tests/e2e/public-profile-smoke.spec.ts --config=playwright.synthetic.config.ts --project=chromium-synthetic --output=test-results/public-profile-smoke
        continue-on-error: true

      - name: Upload Public Profile Smoke Screenshots
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: public-profile-smoke-screenshots
          path: apps/web/test-results/public-profile-smoke-*.png
          if-no-files-found: ignore
          retention-days: 14

      - name: Parse test results
        id: test-results
        env:
          LEGACY_CANARY_ENABLED: ${{ vars.E2E_PROD_LEGACY_CANARY != '0' && '1' || '0' }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const { DEFAULT_RESULT_FILES, formatGithubOutput, parseSyntheticTestResults } = require('./.github/scripts/parse-synthetic-test-results.js');
          const legacyCanaryEnabled = process.env.LEGACY_CANARY_ENABLED === '1';
          const result = parseSyntheticTestResults({ resultFiles: DEFAULT_RESULT_FILES(legacyCanaryEnabled) });
          for (const warning of result.testWarnings) console.log("::warning::" + warning);
          const outputFile = process.env.GITHUB_OUTPUT;
          if (outputFile) fs.appendFileSync(outputFile, formatGithubOutput(result));
          NODE

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: synthetic-test-results
          path: |
            apps/web/test-results/
            apps/web/playwright-report/
          retention-days: 30

      - name: Fail job if tests failed
        if: steps.test-results.outputs.test_status != 'passed'
        run: |
          echo "Marking job as failed because synthetic status is '${{ steps.test-results.outputs.test_status }}'"
          exit 1

      - name: Send Slack Alert on Failure
        if: steps.test-results.outputs.test_status != 'passed'
        uses: 8398a7/action-slack@77eaa4f1c608a7d68b38af4e3f739dcd8cba273e # v3.19.0
        with:
          status: custom
          channel: '#alerts-production'
          author_name: 'Synthetic Monitoring'
          custom_payload: |
            {
              "text": "Production Synthetic Monitoring Failed - jov.ie",
              "attachments": [
                {
                  "color": "danger",
                  "fields": [
                    { "title": "URL", "value": "https://jov.ie", "short": true },
                    { "title": "Failed Tests", "value": "```\n${{ steps.test-results.outputs.failed_tests }}\n```", "short": false },
                    { "title": "Action", "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Details>", "short": false }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Send Slack Success Notification
        if: steps.test-results.outputs.test_status == 'passed' && github.event_name == 'schedule'
        uses: 8398a7/action-slack@77eaa4f1c608a7d68b38af4e3f739dcd8cba273e # v3.19.0
        with:
          status: custom
          channel: '#monitoring'
          author_name: 'Synthetic Monitoring'
          custom_payload: |
            {
              "text": "Production Synthetic Monitoring Passed - jov.ie",
              "attachments": [
                {
                  "color": "good",
                  "fields": [
                    { "title": "URL", "value": "https://jov.ie", "short": true },
                    { "title": "Status", "value": "Production synthetic checks passing", "short": false },
                    { "title": "Tests Passed", "value": "${{ steps.test-results.outputs.passed_tests }}/${{ steps.test-results.outputs.total_tests }}", "short": true }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
