name: Workflow Lint

on:
  push:
    branches: [main]
    paths: ['.github/workflows/**', '.github/actions/**', '.github/actionlint.yaml']
  pull_request:
    paths: ['.github/workflows/**', '.github/actions/**', '.github/actionlint.yaml']

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    # rhysd/actionlint is a Docker action, so it needs a Docker-capable hosted runner.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SHELLCHECK_OPTS: >-
        --exclude=SC2001,SC2016,SC2028,SC2034,SC2086,SC2126,SC2129,SC2329
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: rhysd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca # v1.7.12
      - name: Verify agent workflow hygiene
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - run: pip install pytest --quiet && pytest scripts/tests/test_agent_workflow_hygiene.py -q
