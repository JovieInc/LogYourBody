name: Test Flakiness Report

on:
  schedule:
    # Daily flakiness snapshot at 08:00 UTC; weekly deep report on Mondays.
    - cron: '0 8 * * *'
  workflow_dispatch:

concurrency:
  group: test-flakiness-report
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  actions: read

jobs:
  analyze-flakiness:
    name: Analyze Test Flakiness
    runs-on: ${{ vars.CI_FAST_RUNNER }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Analyze test results from recent runs
        id: analyze
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node .github/scripts/analyze-test-flakiness.js

      - name: Check flaky-rate ratchet
        id: ratchet
        env:
          FLAKY_COUNT: ${{ steps.analyze.outputs.flaky_count || '0' }}
        run: node .github/scripts/check-flaky-ratchet.js

      - name: Upload flakiness report
        if: always() && hashFiles('flakiness-report.md') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flakiness-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: flakiness-report.md
          retention-days: 90

      - name: Find or create tracking issue
        id: find-issue
        if: always() && hashFiles('flakiness-report.md') != ''
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'test-flakiness',
              per_page: 1
            });

            if (issues.length > 0) {
              core.setOutput('issue_number', issues[0].number);
              core.setOutput('issue_exists', 'true');
            } else {
              core.setOutput('issue_exists', 'false');
            }

      - name: Create or update tracking issue
        if: always() && hashFiles('flakiness-report.md') != ''
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          FLAKY_COUNT: ${{ steps.analyze.outputs.flaky_count || '0' }}
          ISSUE_EXISTS: ${{ steps.find-issue.outputs.issue_exists }}
          ISSUE_NUMBER: ${{ steps.find-issue.outputs.issue_number }}
          RATCHET_FAILED: ${{ steps.ratchet.outcome == 'failure' && 'true' || 'false' }}
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('flakiness-report.md', 'utf8');
            const flakyCount = Number.parseInt(process.env.FLAKY_COUNT || '0', 10);
            const issueExists = process.env.ISSUE_EXISTS === 'true';
            const issueNumber = process.env.ISSUE_NUMBER;
            const ratchetFailed = process.env.RATCHET_FAILED === 'true';
            const workflowUrl = `${context.payload.repository.html_url}/actions/workflows/test-flakiness-report.yml`;
            const ratchetNote = ratchetFailed
              ? '\n\n> ⚠️ **Ratchet exceeded**: new untracked flaky tests detected above the committed floor. Fix or quarantine before the floor may be lowered.'
              : '';
            const body = `${report}${ratchetNote}\n\n---\n\nThis issue is automatically updated by the [Test Flakiness Report workflow](${workflowUrl}).`;

            if (flakyCount === 0) {
              if (issueExists) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  state: 'closed',
                  body: `${body}\n\nClosed: no flaky tests detected in the latest report.`
                });
                console.log(`Closed issue #${issueNumber} - no flaky tests detected`);
              }
              return;
            }

            if (issueExists) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body
              });
              console.log(`Updated issue #${issueNumber} with latest flakiness report`);
            } else {
              const { data: newIssue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Test Flakiness Detected - ${flakyCount} flaky tests`,
                body,
                labels: ['test-flakiness', 'automated']
              });
              console.log(`Created new tracking issue #${newIssue.number}`);
            }

      - name: Auto-file deflake issues for high-severity tests
        if: always() && steps.analyze.outputs.high_severity != '0' && steps.analyze.outputs.high_severity != ''
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          QUARANTINE_CANDIDATES: ${{ steps.analyze.outputs.quarantine_candidates || '[]' }}
        with:
          script: |
            const raw = process.env.QUARANTINE_CANDIDATES || '[]';
            let candidates;
            try {
              candidates = JSON.parse(raw);
            } catch {
              console.warn('Could not parse quarantine_candidates:', raw);
              return;
            }
            if (!Array.isArray(candidates) || candidates.length === 0) return;

            for (const candidate of candidates) {
              const deflakeTitle = `[deflake] ${candidate.name} — ${candidate.failureRate}% failure rate`;

              // Check for existing open deflake issue for this test
              const { data: existing } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                labels: 'deflake',
                per_page: 100,
              });

              const alreadyTracked = existing.some(
                issue => issue.title.includes(candidate.name)
              );
              if (alreadyTracked) {
                console.log(`Deflake issue already open for: ${candidate.name}`);
                continue;
              }

              const workflowUrl = `${context.payload.repository.html_url}/actions/workflows/test-flakiness-report.yml`;
              const body = [
                `## Flaky test detected`,
                ``,
                `**Test:** \`${candidate.name}\``,
                `**Failure rate:** ${candidate.failureRate}%`,
                `**Flakiness score:** ${candidate.flakinessScore}`,
                ``,
                `### Actions required`,
                ``,
                `1. **Investigate** — review recent CI logs for this test to identify the root cause (timing, race condition, environment dependency).`,
                `2. **Quarantine** — add the test to \`apps/web/tests/quarantine.json\` so it runs in the non-blocking lane while being fixed. Use the existing ledger schema with a \`fixIssueUrl\` pointing to this issue.`,
                `3. **Lower the ratchet** — once the test is fixed and removed from quarantine, the ratchet automatically adjusts to the tracked-flake count.`,
                `4. **Close this issue** when the test is stable across ≥10 CI runs.`,
                ``,
                `---`,
                `*Auto-filed by [Test Flakiness Report](${workflowUrl}) on ${new Date().toISOString().split('T')[0]}.*`,
              ].join('\n');

              const { data: issue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: deflakeTitle,
                body,
                labels: ['deflake', 'test-flakiness', 'automated'],
              });
              console.log(`Created deflake issue #${issue.number}: ${deflakeTitle}`);
            }

      - name: Summarize report
        if: always()
        env:
          FLAKY_COUNT: ${{ steps.analyze.outputs.flaky_count || '0' }}
          RETRY_RATE: ${{ steps.analyze.outputs.retry_rate || '0' }}
          HIGH_SEVERITY: ${{ steps.analyze.outputs.high_severity || '0' }}
          RATCHET_STATUS: ${{ steps.ratchet.outcome }}
        run: |
          {
            echo "### Test flakiness report"
            echo
            echo "- Flaky tests: $FLAKY_COUNT"
            echo "- High severity: $HIGH_SEVERITY"
            echo "- Retry rate: $RETRY_RATE%"
            echo "- Ratchet: $RATCHET_STATUS"
          } >> "$GITHUB_STEP_SUMMARY"