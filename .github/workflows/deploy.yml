name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: production-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      ios: ${{ steps.filter.outputs.ios }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/**'
              - '.npmrc'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'vercel.json'
              - 'apps/web/vercel.json'
            ios:
              - 'apps/ios/**'

  web:
    name: Web
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.web == 'true'
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || vars.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || 'pk_test_Y2xlcmsucGxhY2Vob2xkZXIuZGV2JA' }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY || vars.CLERK_SECRET_KEY || 'sk_test_placeholder' }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || vars.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || vars.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || vars.SUPABASE_SERVICE_ROLE_KEY || 'placeholder-service-key' }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Test
        run: pnpm test:ci

      - name: Build
        run: cd apps/web && pnpm build

      - name: Pull Vercel environment
        run: pnpm dlx vercel@latest pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build Vercel output
        run: pnpm dlx vercel@latest build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel
        id: vercel-deploy
        run: |
          DEPLOYMENT_URL=$(pnpm dlx vercel@latest deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          echo "url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to $DEPLOYMENT_URL"

      - name: Deploy info
        run: |
          echo "## Web Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Build and production deploy completed successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "URL: ${{ steps.vercel-deploy.outputs.url }}" >> $GITHUB_STEP_SUMMARY

  ios-beta:
    name: iOS Beta
    runs-on: macos-26
    needs: [detect-changes, web]
    if: needs.detect-changes.outputs.ios == 'true' && false # Enable when ready
    timeout-minutes: 30
    environment:
      name: development
      url: https://testflight.apple.com
    steps:
      - uses: actions/checkout@v4

      - name: Setup iOS build environment
        uses: ./.github/actions/setup-ios-build
        with:
          xcode-version: 'latest-stable'
          working-directory: apps/ios
          setup-ruby: 'true'
          create-config-files: 'true'

      - name: Setup App Store Connect API key
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          cd apps/ios
          mkdir -p fastlane

          ruby <<'RUBY'
          require "json"

          api_key = {
            "key_id" => ENV.fetch("ASC_KEY_ID"),
            "issuer_id" => ENV.fetch("ASC_ISSUER_ID"),
            "key" => ENV.fetch("ASC_PRIVATE_KEY").gsub("\\n", "\n"),
            "duration" => 1200,
            "in_house" => false
          }

          File.write("fastlane/api_key.json", JSON.pretty_generate(api_key))
          JSON.parse(File.read("fastlane/api_key.json"))
          RUBY

          echo "APP_STORE_CONNECT_API_KEY_PATH=$(pwd)/fastlane/api_key.json" >> "$GITHUB_ENV"

      - name: Generate build number
        id: build
        run: |
          BUILD_NUMBER=$(date -u +%Y%m%d%H%M%S)
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT

      - name: Deploy to TestFlight
        run: |
          cd apps/ios
          bundle exec fastlane beta build_number:${{ steps.build.outputs.build_number }}
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_IDENTIFIER: com.logyourbody.app
          APP_STORE_APP_ID: "6755209876"
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}

      - name: Cleanup
        if: always()
        run: |
          cd apps/ios
          rm -f fastlane/api_key.json

  deploy-summary:
    name: Deploy Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [detect-changes, web, ios-beta]
    steps:
      - name: Generate summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Web changed: ${{ needs.detect-changes.outputs.web }}" >> $GITHUB_STEP_SUMMARY
          echo "- iOS changed: ${{ needs.detect-changes.outputs.ios }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.web.result }}" == "success" ]]; then
            echo "✅ Web deployment completed" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.web.result }}" == "skipped" ]]; then
            echo "⏭️ Web deployment skipped (no changes)" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.web.result }}" == "failure" ]]; then
            echo "❌ Web deployment failed" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ "${{ needs.ios-beta.result }}" == "success" ]]; then
            echo "✅ iOS deployment completed" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.ios-beta.result }}" == "skipped" ]]; then
            echo "⏭️ iOS deployment skipped (disabled or no changes)" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.ios-beta.result }}" == "failure" ]]; then
            echo "❌ iOS deployment failed" >> $GITHUB_STEP_SUMMARY
          fi
