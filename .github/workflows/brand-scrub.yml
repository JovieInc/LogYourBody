# Brand-scrub gate — blocks competitor analysis & private strategy docs from landing
# in this public repo. See scripts/brand-scrub.py and issue #11024.
#
# Two checks:
#   1. brand-scrub: flags changed files in blocked strategy-doc paths or with competitor brand names.
#   2. brand-scrub-unit-tests: runs scripts/tests/test_brand_scrub.py on every push.
#
# Exit 1 from brand-scrub.py causes the CI job to fail, blocking PR merge.
name: Brand Scrub

on:
  pull_request:
    branches: [main]
    paths:
      - '**.md'
      - '**.mdx'
      - '**.txt'
      - 'docs/**'
  push:
    branches: [main]
    paths:
      - 'scripts/brand-scrub.py'
      - 'scripts/tests/test_brand_scrub.py'

permissions:
  contents: read

jobs:
  brand-scrub:
    name: Brand Scrub (blocking)
    runs-on: ${{ vars.CI_FAST_RUNNER }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Get changed files
        id: changed
        run: |
          # --diff-filter=d excludes deleted files: removing a blocked-path doc is
          # the desired action, not a violation, and a deleted file can't be scanned.
          git diff --name-only --diff-filter=d origin/${{ github.base_ref }}...HEAD \
            | grep -E '\.(md|mdx|txt)$|^docs/' \
            | grep -v -E '^(node_modules|\.cache|drizzle/migrations)' \
            > /tmp/changed_files.txt || true

          if [ -s /tmp/changed_files.txt ]; then
            echo "has_files=true" >> "$GITHUB_OUTPUT"
            echo "Changed files to check:"
            cat /tmp/changed_files.txt
          else
            echo "has_files=false" >> "$GITHUB_OUTPUT"
            echo "No relevant files changed."
          fi

      - name: Run brand-scrub on changed files
        if: steps.changed.outputs.has_files == 'true'
        run: |
          mapfile -t files < /tmp/changed_files.txt
          python3 scripts/brand-scrub.py "${files[@]}"

      - name: No relevant files changed — skip
        if: steps.changed.outputs.has_files == 'false'
        run: echo "No .md/.mdx/.txt or docs/ files changed — brand-scrub skipped."

  brand-scrub-unit-tests:
    name: brand-scrub.py unit tests
    runs-on: ${{ vars.CI_FAST_RUNNER }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Install pytest
        run: pip install pytest --quiet

      - name: Run brand-scrub unit tests
        run: pytest scripts/tests/test_brand_scrub.py -v
