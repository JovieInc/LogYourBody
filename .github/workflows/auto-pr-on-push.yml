# Auto-PR on Agent Push
#
# PURPOSE: Automatically creates a PR when an agent (Codex, Claude, etc.) pushes
# code to an agent branch without an existing PR. This closes the gap where
# agents complete work and push, but leave no PR for the CI pipeline to process.
#
# TRIGGER: Push to agent branch pattern (codex/*, codegen-bot/*, linear/*, claude/*,
#          plus personal branches like tim/jov-XXXX-description)
#
# SAFETY:
# - Idempotent: skips if PR already exists for the branch
# - Skips audit-only pushes (branches with only docs/audits and no code changes)
# - Extracts Linear ticket ID from branch name for traceability
# - Creates a draft PR so verification can run before it enters the full pipeline
# - Does NOT bypass any quality gates (CI, scope judge, auto-approve all still apply)

name: Auto-PR on Agent Push

on:
  push:
    branches:
      - 'codex/**'
      - 'codegen-bot/**'
      - 'linear/**'
      - 'claude/**'
      - '*/jov-**'

permissions: {}

concurrency:
  group: auto-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  open-pr:
    name: Open PR
    # Fleet controller: use the hosted image contract so `gh` is always
    # available and persistent runner workspaces cannot supply stale helpers.
    runs-on: ubuntu-latest
    timeout-minutes: 12
    permissions:
      contents: read
    steps:
      - name: Stagger start to avoid CI stampede
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          # Hash the branch name to get a deterministic delay (0-120s).
          # When 50 Codex branches push simultaneously, this spreads PR creation
          # over ~2 minutes instead of all hitting at once.
          HASH=$(echo -n "$BRANCH" | md5sum | tr -d -c '0-9' | head -c 8)
          DELAY=$((10#$HASH % 120))
          echo "Stagger delay for $BRANCH: ${DELAY}s (hash-based)"
          sleep $DELAY
      - name: Generate Jovie Bot token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.JOVIE_BOT_APP_ID }}
          private-key: ${{ secrets.JOVIE_BOT_PRIVATE_KEY }}

      - name: Checkout main policy code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # The pushed branch is data for this controller, not its source code.
          # Older agent branches may not contain current workflow helpers.
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Verify GitHub CLI
        run: gh --version

      - name: Check for code changes
        id: diff
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          # Materialize the triggering branch explicitly while keeping current
          # main checked out as the fleet controller source of truth.
          git fetch origin "refs/heads/$BRANCH:refs/remotes/origin/$BRANCH"

          # Compare this branch against main to get all changed files
          CHANGED=$(git diff --name-only "origin/main...origin/$BRANCH")

          if [[ -z "$CHANGED" ]]; then
            echo "No files changed vs main. Skipping PR."
            echo "has_code_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Changed files:"
          echo "$CHANGED"

          # Filter out audit-only files: audits/, docs/, and standalone markdown.
          # Workflow changes are executable automation code and should open PRs.
          # A push is "audit-only" if every changed file matches these patterns
          CODE_CHANGES=$(echo "$CHANGED" | grep -vE '^(audits/|docs/|[^/]+\.md$)' || true)

          if [[ -z "$CODE_CHANGES" ]]; then
            echo "All changes are audit/docs only. Skipping PR creation."
            echo "has_code_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "Found code changes:"
            echo "$CODE_CHANGES"
            echo "has_code_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for existing PR and rate limit
        if: steps.diff.outputs.has_code_changes == 'true'
        id: check
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPOSITORY: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          MAX_OPEN_AGENT_PRS: '5'
          MAX_WAIT_MINUTES: '6'
        run: |
          source .github/scripts/github-output.sh

          echo "Branch: $BRANCH"

          # Use jq --arg to prevent shell injection via branch name
          EXISTING=$(gh api --paginate "repos/$REPOSITORY/pulls?state=open&per_page=100" \
            | jq -s --arg branch "$BRANCH" '[.[][] | select(.head.ref == $branch and .state == "open")] | length')

          if [[ "$EXISTING" -gt 0 ]]; then
            echo "PR already exists for $BRANCH. Skipping."
            write_output should_create false
            exit 0
          fi

          # Rate limit with retry: wait for capacity instead of silently dropping
          MAX_WAIT=$((MAX_WAIT_MINUTES * 60))
          WAITED=0
          POLL_INTERVAL=30

          while true; do
            # Use gh api (REST) instead of gh pr list (GraphQL) to avoid
            # App token scope issues with gh CLI's internal GraphQL queries
            OPEN_AGENT_PRS=$(gh api --paginate "repos/$REPOSITORY/pulls?state=open&per_page=100" \
              | jq -s '[.[][] | select(.head.ref | test("^(codex|codegen-bot|linear|claude)/") or test("^[^/]+/jov-[0-9]+([_-].+)?$"; "i"))] | length')

            echo "Open agent PRs: $OPEN_AGENT_PRS / $MAX_OPEN_AGENT_PRS (waited ${WAITED}s)"

            if [[ "$OPEN_AGENT_PRS" -lt "$MAX_OPEN_AGENT_PRS" ]]; then
              echo "Capacity available. Will create PR."
              write_output should_create true
              break
            fi

            if [[ "$WAITED" -ge "$MAX_WAIT" ]]; then
              echo "::warning::Rate limit still hit after waiting ${MAX_WAIT}s ($OPEN_AGENT_PRS open agent PRs). Skipping PR for $BRANCH."
              write_output should_create false
              write_output capacity_blocked true
              write_output open_agent_prs "$OPEN_AGENT_PRS"
              write_output max_open_agent_prs "$MAX_OPEN_AGENT_PRS"
              write_output waited_seconds "$WAITED"
              break
            fi

            echo "Rate limit reached. Waiting ${POLL_INTERVAL}s for capacity..."
            sleep $POLL_INTERVAL
            WAITED=$((WAITED + POLL_INTERVAL))
          done

      - name: Record capacity blocked AgentRunArtifact
        if: steps.diff.outputs.has_code_changes == 'true' && steps.check.outputs.capacity_blocked == 'true'
        env:
          BRANCH_NAME: ${{ github.ref_name }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          OPEN_AGENT_PRS: ${{ steps.check.outputs.open_agent_prs }}
          MAX_OPEN_AGENT_PRS: ${{ steps.check.outputs.max_open_agent_prs }}
          WAITED_SECONDS: ${{ steps.check.outputs.waited_seconds }}
        run: |
          ARTIFACT_FILE="$RUNNER_TEMP/agent-run-artifacts/auto-pr-capacity-blocked.json"
          mkdir -p "$(dirname "$ARTIFACT_FILE")"
          NOW="$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")"
          SAFE_BRANCH="$(printf '%s' "$BRANCH_NAME" | tr -c 'a-zA-Z0-9._-' '-')"

          jq -n \
            --arg id "auto-pr-capacity-${GITHUB_RUN_ID}-${SAFE_BRANCH}" \
            --arg runId "$GITHUB_RUN_ID" \
            --arg branchName "$BRANCH_NAME" \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg now "$NOW" \
            --argjson openAgentPrs "$OPEN_AGENT_PRS" \
            --argjson maxOpenAgentPrs "$MAX_OPEN_AGENT_PRS" \
            --argjson waitedSeconds "$WAITED_SECONDS" \
            '{
              id: $id,
              source: "github",
              sourceRunId: $runId,
              kind: "workflow",
              status: "blocked",
              title: "Auto-PR capacity exhausted",
              summary: "Auto-PR creation for \($branchName) was blocked because \($openAgentPrs) agent PRs were already open.",
              modelRoute: "deterministic",
              allowedActions: ["read", "open_pr"],
              forbiddenActions: ["ready_pr", "merge", "deploy", "mutate_linear", "send_outbound", "mutate_production_data", "change_auth", "change_billing", "change_security"],
              humanApprovalRequired: false,
              humanGate: { required: false, status: "not_required", reason: null, reviewer: null, reviewedAt: null },
              linearIssueId: null,
              linearIssueUrl: null,
              pullRequestUrl: null,
              adminSurface: "/app/admin/ops",
              verificationGates: [{
                name: "github.ci",
                required: false,
                status: "blocked",
                evidenceUrl: "https://github.com/\($repository)/actions/runs/\($runId)",
                summary: "Auto-PR capacity guard blocked PR creation.",
                checkedAt: $now
              }],
              costEstimate: { usd: 0, route: "deterministic", inputTokens: 0, outputTokens: 0, notes: "No model call was made." },
              blockedReason: "Open agent PR count \($openAgentPrs) reached configured limit \($maxOpenAgentPrs) after \($waitedSeconds)s.",
              createdAt: $now,
              updatedAt: $now,
              metadata: {
                branchName: $branchName,
                repository: $repository,
                openAgentPrs: $openAgentPrs,
                maxOpenAgentPrs: $maxOpenAgentPrs,
                waitedSeconds: $waitedSeconds
              }
            }' > "$ARTIFACT_FILE"

      - name: Upload capacity blocked AgentRunArtifact
        if: steps.diff.outputs.has_code_changes == 'true' && steps.check.outputs.capacity_blocked == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: agent-run-artifact-auto-pr-capacity-blocked
          path: ${{ runner.temp }}/agent-run-artifacts/auto-pr-capacity-blocked.json
          if-no-files-found: error

      - name: Parse branch name
        id: parse
        if: steps.diff.outputs.has_code_changes == 'true' && steps.check.outputs.should_create == 'true'
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          source .github/scripts/github-output.sh

          # Extract Linear ticket ID (JOV-123) from anywhere in the branch name
          # Handles: codex/linear-mention-jov-854-desc, linear/JOV-42-desc, claude/jov-100-fix
          TICKET=$(echo "$BRANCH" | grep -oiP 'jov-\d+' | head -1 | tr '[:lower:]' '[:upper:]' || echo "")
          write_output ticket "$TICKET"

          # Build PR title from branch name
          # Strip the agent prefix (codex/, claude/, etc.)
          SLUG="${BRANCH#*/}"

          if [[ -n "$TICKET" ]]; then
            # Remove ticket from slug to avoid duplication in title
            DESC=$(echo "$SLUG" | sed -E "s/[-_]?${TICKET,,}[-_]?//gI" | sed 's/^[-_]//;s/[-_]$//' | tr -- '-_' '  ')
            TITLE="${TICKET}: ${DESC}"
          else
            DESC=$(echo "$SLUG" | tr -- '-_' '  ')
            TITLE="$DESC"
          fi

          # Capitalize first letter of description
          TITLE=$(echo "$TITLE" | sed 's/\(: \)\(.\)/\1\U\2/;s/^\(.\)/\U\1/')

          write_output title "$TITLE"
          echo "PR title: $TITLE"

      - name: Fetch Linear ticket details
        id: linear
        if: steps.diff.outputs.has_code_changes == 'true' && steps.check.outputs.should_create == 'true' && steps.parse.outputs.ticket != ''
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          source .github/scripts/github-output.sh

          TICKET="${{ steps.parse.outputs.ticket }}"

          if [[ -z "$LINEAR_API_KEY" ]]; then
            echo "No LINEAR_API_KEY. Skipping ticket lookup."
            write_output has_details false
            exit 0
          fi

          # Fetch issue details from Linear GraphQL API
          RESPONSE=$(curl -sS https://api.linear.app/graphql \
            -H "Authorization: $LINEAR_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg id "$TICKET" '{
              query: "query($id: String!) { issueVcsBranchSearch(branchName: $id) { id identifier title url description state { name } } }",
              variables: { id: $id }
            }')")

          ISSUE_ID=$(echo "$RESPONSE" | jq -r '.data.issueVcsBranchSearch.id // ""')
          ISSUE_TITLE=$(echo "$RESPONSE" | jq -r '.data.issueVcsBranchSearch.title // ""')
          ISSUE_URL=$(echo "$RESPONSE" | jq -r '.data.issueVcsBranchSearch.url // ""')
          ISSUE_DESC=$(echo "$RESPONSE" | jq -r '.data.issueVcsBranchSearch.description // ""' | head -c 2000)

          if [[ -n "$ISSUE_ID" ]]; then
            echo "Found Linear issue: $ISSUE_TITLE"
            write_output has_details true
            write_output issue_id "$ISSUE_ID"
            write_output issue_title "$ISSUE_TITLE"
            write_output issue_url "$ISSUE_URL"

            # Override PR title with actual ticket title
            write_output title "${TICKET}: ${ISSUE_TITLE}"

            # Base64 encode description for safe multiline handling
            write_output issue_desc "$(echo "$ISSUE_DESC" | base64 -w0)"
          else
            echo "Linear issue not found for $TICKET"
            write_output has_details false
          fi

      - name: Create PR
        if: steps.diff.outputs.has_code_changes == 'true' && steps.check.outputs.should_create == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BRANCH: ${{ github.ref_name }}
          TICKET: ${{ steps.parse.outputs.ticket }}
          HAS_LINEAR: ${{ steps.linear.outputs.has_details }}
          LINEAR_TITLE: ${{ steps.linear.outputs.title }}
          PARSED_TITLE: ${{ steps.parse.outputs.title }}
          LINEAR_ISSUE_URL: ${{ steps.linear.outputs.issue_url }}
          LINEAR_ISSUE_ID: ${{ steps.linear.outputs.issue_id }}
          LINEAR_ISSUE_DESC_B64: ${{ steps.linear.outputs.issue_desc }}
        run: |

          # Use Linear title if available, otherwise parsed title
          if [[ "$HAS_LINEAR" == "true" ]]; then
            TITLE="$LINEAR_TITLE"
          else
            TITLE="$PARSED_TITLE"
          fi

          RUN_URL="/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Build PR body using a temp file to safely handle special characters
          BODY_FILE=$(mktemp)
          trap 'rm -f "$BODY_FILE"' EXIT

          if [[ "$HAS_LINEAR" == "true" ]]; then
            ISSUE_DESC=$(echo "$LINEAR_ISSUE_DESC_B64" | base64 -d 2>/dev/null || echo "")
            {
              echo "## Goal"
              echo ""
              printf '%s\n' "$ISSUE_DESC"
              echo ""
              echo "## Linear"
              echo ""
              echo "- Issue: ${TICKET}"
              echo "- URL: ${LINEAR_ISSUE_URL}"
              echo ""
              echo "<!-- linear-issue-id:${LINEAR_ISSUE_ID} -->"
              echo "<!-- linear-issue-identifier:${TICKET} -->"
              echo ""
              echo "---"
              echo "*PR auto-created by [Auto-PR on Agent Push](${RUN_URL})*"
            } > "$BODY_FILE"
          elif [[ -n "$TICKET" ]]; then
            {
              echo "## Goal"
              echo ""
              echo "Implements ${TICKET} from Linear."
              echo ""
              echo "<!-- linear-issue-identifier:${TICKET} -->"
              echo ""
              echo "---"
              echo "*PR auto-created by [Auto-PR on Agent Push](${RUN_URL})*"
            } > "$BODY_FILE"
          else
            {
              echo "## Goal"
              echo ""
              echo "Agent-generated changes on \`${BRANCH}\`."
              echo ""
              echo "---"
              echo "*PR auto-created by [Auto-PR on Agent Push](${RUN_URL})*"
            } > "$BODY_FILE"
          fi

          PR_URL=$(gh pr create \
            --repo "${{ github.repository }}" \
            --base main \
            --head "$BRANCH" \
            --draft \
            --title "$TITLE" \
            --body-file "$BODY_FILE")

          echo "Created PR: $PR_URL"
