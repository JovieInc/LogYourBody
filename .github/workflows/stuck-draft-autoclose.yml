name: Stuck Draft Auto-Close

# Closes agent-owned draft PRs that have been idle (>48h since last update)
# with failing checks. This prevents stale drafts from accumulating and
# confusing the merge-queue prioritization.
#
# Opt out per-PR with any of: needs-human, hold, gated.
# Human-owned branches are never touched.

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:

concurrency:
  group: stuck-draft-autoclose
  cancel-in-progress: false

permissions:
  pull-requests: write
  contents: read
  checks: read

jobs:
  autoclose:
    runs-on: ${{ vars.CI_FAST_RUNNER }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Auto-close stuck agent drafts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          GH_RETRY_ATTEMPTS: 8
          GH_RETRY_MAX_DELAY: 60
          STUCK_IDLE_HOURS: 48
        run: bash scripts/stuck-draft-autoclose.sh
