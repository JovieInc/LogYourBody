# Recurring doc-gardening agent (JOV-3644).
#
# Scans gardening-only stale docs (docs/doc-gardening/**) and opens fix-up PRs
# when freshness markers drift from computed repo facts.
name: Doc Gardening Agent

on:
  schedule:
    - cron: '15 3 * * 1'
      timezone: 'America/Los_Angeles'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Report stale gardening docs without opening a PR'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: doc-gardening-agent
  cancel-in-progress: false

jobs:
  garden:
    name: Scan and fix stale docs
    runs-on: ${{ vars.CI_FAST_RUNNER }}
    timeout-minutes: 10
    steps:
      - name: Generate Jovie Bot token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.JOVIE_BOT_APP_ID }}
          private-key: ${{ secrets.JOVIE_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 1
          token: ${{ steps.app-token.outputs.token }}

      - uses: ./.github/actions/setup-node-pnpm

      - name: Verify CI-scope doc freshness is green
        run: pnpm doc:freshness:check

      - name: Run doc-gardening agent
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            node scripts/doc-gardening-agent.mjs --dry-run
          else
            node scripts/doc-gardening-agent.mjs
          fi