# Test Coverage Audit
#
# PURPOSE: Nightly regeneration of docs/TEST_COVERAGE_HEATMAP.md from the
# hand-curated docs/TEST_RISK_REGISTER.md plus v8 coverage data.
#
# Output: commits an updated heatmap to main only when values change and uploads
# daily unit coverage to Codecov.
# Also commits apps/web/reports/test-coverage-snapshot.json (machine-readable
# baseline) so any PR can run `pnpm run test:coverage:diff` and compare to
# the canonical baseline from main.
#
# Strategy spec: docs/TEST_RISK_REGISTER.md
# Generator:    scripts/audit-test-coverage.ts

name: Test Coverage Audit

on:
  schedule:
    # 06:00 UTC daily — runs after the nightly test suite (02:00 PT = ~10:00 UTC)
    # so any newly-merged tests are reflected.
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      commit:
        description: 'Commit the regenerated heatmap if it changed'
        type: boolean
        default: true

permissions: {}

concurrency:
  group: test-coverage-audit
  cancel-in-progress: false

jobs:
  audit:
    name: Regenerate coverage heatmap
    runs-on: ${{ vars.CI_FAST_RUNNER }}
    timeout-minutes: 30
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/setup-node-pnpm

      - name: Run coverage
        # Unit tests are auth-mocked at the SDK boundary — they do not need
        # production Clerk keys. Per .claude/rules/auth.md, unprefixed CLERK_*
        # secrets are the production keypair. Inject test-mode literals so
        # CI never has prod-Clerk material in scope.
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ZHVtbXktdGVzdC1jb3ZlcmFnZS5jbGVyay5hY2NvdW50cy5kZXYk
          CLERK_SECRET_KEY: sk_test_dummy_secret_for_coverage_run_only
        run: pnpm --filter web test:coverage

      - name: Generate heatmap
        run: pnpm exec tsx scripts/audit-test-coverage.ts

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/web/coverage/lcov.info
          flags: nightly-unittests
          fail_ci_if_error: false
          verbose: true

      - name: Commit if changed
        if: ${{ github.event_name == 'schedule' || inputs.commit }}
        run: |
          if git diff --quiet docs/TEST_COVERAGE_HEATMAP.md apps/web/reports/test-coverage-snapshot.json 2>/dev/null; then
            echo "No heatmap changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Pull before push to avoid races with concurrent merges.
          git pull --rebase --autostash origin main || {
            echo "Rebase failed — exiting without push."
            exit 1
          }
          git add docs/TEST_COVERAGE_HEATMAP.md apps/web/reports/test-coverage-snapshot.json
          if git diff --staged --quiet; then
            echo "Nothing staged after rebase."
            exit 0
          fi
          git commit -m "chore(testing): nightly heatmap refresh" \
            -m "Auto-generated by .github/workflows/test-coverage-audit.yml from docs/TEST_RISK_REGISTER.md + apps/web/coverage/coverage-final.json." \
            -m "Co-Authored-By: Claude Opus 4.7 (1M context) <noreply@anthropic.com>"
          git push

      - name: Notify on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Surface cron failures as a Linear-trackable GitHub issue rather
          # than silently letting the nightly heatmap go stale.
          gh issue list --label "test-coverage-audit-failure" --state open --json number --jq '.[].number' | head -1 | grep -q . && {
            echo "Existing failure issue open — skipping new file."
            exit 0
          }
          gh issue create \
            --title "Nightly test-coverage-audit failed ($(date -u +%Y-%m-%d))" \
            --body "The nightly heatmap refresh failed. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --label "test-coverage-audit-failure" || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-audit-${{ github.run_id }}
          path: |
            apps/web/coverage/coverage-final.json
            apps/web/coverage/lcov.info
            docs/TEST_COVERAGE_HEATMAP.md
            apps/web/reports/test-coverage-snapshot.json
          retention-days: 14
          if-no-files-found: warn
