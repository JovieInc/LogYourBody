# Agent PR Verify + Ready
#
# Draft agent PRs do not run the main CI/scope automation. This workflow gives
# same-repo agent branches a small unprivileged verification gate and marks the
# PR ready only after that gate passes.

name: Agent PR Verify Ready

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions: {}

concurrency:
  group: agent-pr-verify-ready-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify-ready:
    name: Verify Draft Agent PR
    if: >-
      github.event.pull_request.draft &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      (
        startsWith(github.event.pull_request.head.ref, 'linear/') ||
        startsWith(github.event.pull_request.head.ref, 'claude/') ||
        startsWith(github.event.pull_request.head.ref, 'codegen-bot/') ||
        startsWith(github.event.pull_request.head.ref, 'codex/')
      )
    runs-on: ${{ vars.CI_FAST_RUNNER }}
    timeout-minutes: 25
    permissions:
      contents: read
      issues: read
      pull-requests: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Run affected typecheck
        run: pnpm turbo typecheck --affected

      - name: Run affected lint
        run: pnpm turbo lint --affected

      - name: Checkout main policy code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          path: policy-main
          persist-credentials: false

      - name: Install main policy dependencies
        run: pnpm --dir policy-main install --frozen-lockfile

      - name: Require GStack gate evidence
        working-directory: policy-main
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
          AGENT_RUN_SOURCE_RUN_ID: ${{ github.event.pull_request.head.sha }}
        run: |
          EVIDENCE_FILE="$RUNNER_TEMP/agent-gate-evidence.md"
          gh pr view "$PR_NUMBER" --json body --jq '.body // ""' > "$EVIDENCE_FILE"
          gh api --paginate "repos/$REPOSITORY/issues/$PR_NUMBER/comments" \
            --jq '.[].body // ""' >> "$EVIDENCE_FILE"

          pnpm --filter @jovie/web exec tsx scripts/check-agent-gate-evidence.ts "$EVIDENCE_FILE"

      - name: Generate Jovie Bot token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.JOVIE_BOT_APP_ID }}
          private-key: ${{ secrets.JOVIE_BOT_PRIVATE_KEY }}

      - name: Mark PR ready if the live state is still eligible
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          EXPECTED_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          HOLD_LABEL_RE='^(needs-human|hold|gated|queue-deferred|fast)$'

          read_state() {
            gh pr view "$PR_NUMBER" --json isDraft,headRefOid,labels
          }

          before="$(read_state)"
          live_head="$(jq -r '.headRefOid' <<<"$before")"
          if [[ "$live_head" != "$EXPECTED_HEAD_SHA" ]]; then
            echo "::error::PR head changed during verification ($live_head != $EXPECTED_HEAD_SHA)"
            exit 1
          fi
          if [[ "$(jq -r '.isDraft' <<<"$before")" != "true" ]]; then
            echo "PR is no longer draft; nothing to promote."
            exit 0
          fi
          if jq -e --arg re "$HOLD_LABEL_RE" \
            '[.labels[].name] | any(test($re))' <<<"$before" >/dev/null; then
            echo "PR gained a hold label during verification; leaving it draft."
            exit 0
          fi

          gh pr ready "$PR_NUMBER"

          after="$(read_state)"
          after_head="$(jq -r '.headRefOid' <<<"$after")"
          held_after=false
          if jq -e --arg re "$HOLD_LABEL_RE" \
            '[.labels[].name] | any(test($re))' <<<"$after" >/dev/null; then
            held_after=true
          fi
          if [[ "$after_head" != "$EXPECTED_HEAD_SHA" || "$held_after" == "true" ]]; then
            gh pr ready "$PR_NUMBER" --undo
            echo "::error::PR eligibility changed during promotion; restored draft state"
            exit 1
          fi
          if [[ "$(jq -r '.isDraft' <<<"$after")" != "false" ]]; then
            echo "::error::gh pr ready returned without promoting the PR"
            exit 1
          fi
