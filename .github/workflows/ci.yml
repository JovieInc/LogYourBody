name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  # Main-branch runs must not cancel each other. A rapid second merge can
  # otherwise kill the release/deploy evidence for the first merge.
  group: >-
    ci-${{ github.workflow }}-${{
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
        && github.sha
        || github.ref
    }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      ios: ${{ steps.filter.outputs.ios }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify workflow concurrency policy
        run: node .github/scripts/verify-workflow-concurrency.mjs

      - name: Detect changed surfaces locally
        id: filter
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [[ "$BASE_SHA" =~ ^0+$ ]]; then
            changed_files=$(git diff-tree --no-commit-id --name-only -r "$HEAD_SHA")
          else
            diff_base="$BASE_SHA"
            if ! git cat-file -e "$diff_base^{commit}" 2>/dev/null; then
              git fetch --no-tags --depth=100 origin main
            fi
            if ! git cat-file -e "$diff_base^{commit}" 2>/dev/null; then
              diff_base='origin/main'
            fi
            changed_files=$(git diff --name-only "$diff_base" "$HEAD_SHA")
          fi

          web_pattern='^(apps/web/|packages/|\.github/actions/|\.github/scripts/|\.github/workflows/|package\.json$|pnpm-lock\.yaml$|pnpm-workspace\.yaml$|scripts/(supabase|web)/|supabase/|turbo\.json$)'
          ios_pattern='^(apps/ios/|\.github/actions/setup-ios-build/|\.github/workflows/ci\.yml$|\.github/workflows/ios[^/]*\.yml$|scripts/ios/|package\.json$)'

          if printf '%s\n' "$changed_files" | grep -Eq "$web_pattern"; then
            echo 'web=true' >> "$GITHUB_OUTPUT"
          else
            echo 'web=false' >> "$GITHUB_OUTPUT"
          fi

          if printf '%s\n' "$changed_files" | grep -Eq "$ios_pattern"; then
            echo 'ios=true' >> "$GITHUB_OUTPUT"
          else
            echo 'ios=false' >> "$GITHUB_OUTPUT"
          fi

  js:
    name: JavaScript/TypeScript
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.web == 'true'
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || vars.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || vars.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || vars.SUPABASE_SERVICE_ROLE_KEY || 'placeholder-service-key' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Supabase schema checks
        run: pnpm db:schema:check

      - name: Type check
        run: pnpm typecheck

      - name: Test
        run: pnpm test:ci

  ios:
    name: iOS
    runs-on: macos-14
    needs: detect-changes
    if: needs.detect-changes.outputs.ios == 'true'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup iOS build environment
        uses: ./.github/actions/setup-ios-build
        with:
          xcode-version: '16.1'
          working-directory: apps/ios
          setup-ruby: 'true'
          create-config-files: 'true'

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: |
            apps/ios/.build
            ~/Library/Developer/Xcode/DerivedData
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-xcode-16.1-${{ hashFiles('**/Package.resolved', '**/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-spm-xcode-16.1-
            ${{ runner.os }}-spm-

      - name: Fastlane iOS CI
        run: |
          cd apps/ios
          bundle exec fastlane ci_ios

  ios_quality:
    name: iOS Launch Quality Gate
    runs-on: macos-15
    needs: detect-changes
    if: needs.detect-changes.outputs.ios == 'true'
    timeout-minutes: 36
    steps:
      - uses: actions/checkout@v4

      - name: Setup iOS build environment
        uses: ./.github/actions/setup-ios-build
        with:
          xcode-version: 'latest-stable'
          working-directory: apps/ios
          setup-ruby: 'true'
          create-config-files: 'true'

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: |
            apps/ios/.build
            ~/Library/Developer/Xcode/DerivedData
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-quality-spm-xcode-latest-stable-${{ hashFiles('**/Package.resolved', '**/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-quality-spm-xcode-latest-stable-
            ${{ runner.os }}-spm-

      - name: Run launch quality audit
        timeout-minutes: 26
        env:
          DESTINATION: auto
          ARTIFACT_DIR: ${{ github.workspace }}/apps/ios/test_results/quality-gate/ci-${{ github.run_id }}/launch-quality
        run: bash scripts/ios/launch-quality-audit.sh

      - name: Run performance budget audit
        timeout-minutes: 8
        env:
          DESTINATION: auto
          RUN_SWIFTLINT: false
          RUN_LAUNCH_PERFORMANCE: false
          ARTIFACT_DIR: ${{ github.workspace }}/apps/ios/test_results/quality-gate/ci-${{ github.run_id }}/performance
        run: bash scripts/ios/performance-audit.sh

      - name: Upload quality gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-launch-quality-gate-${{ github.run_id }}
          path: apps/ios/test_results/quality-gate/ci-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 14

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [detect-changes, js, ios, ios_quality]
    steps:
      - name: Check results
        run: |
          {
            echo "## CI Summary"
            echo ""
            echo "- Web changed: ${{ needs.detect-changes.outputs.web }}"
            echo "- iOS changed: ${{ needs.detect-changes.outputs.ios }}"
            echo "- iOS quality gate: ${{ needs.ios_quality.result }}"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          # Check if any required jobs failed
          if [[ "${{ needs.js.result }}" == "failure" ]] || \
             [[ "${{ needs.ios.result }}" == "failure" ]] || \
             [[ "${{ needs.ios_quality.result }}" == "failure" ]]; then
            echo "❌ One or more CI jobs failed" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "✅ All CI checks passed!" >> "$GITHUB_STEP_SUMMARY"
