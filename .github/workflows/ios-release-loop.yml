name: iOS Release Loop

on:
  push:
    branches: [main]
    paths:
      - 'apps/ios/**'
      - '.github/workflows/ios-release-loop.yml'
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        type: choice
        options:
          - testflight
          - app_store
      submit_for_review:
        description: 'Submit App Store builds for Apple review'
        required: false
        type: boolean
        default: true
      automatic_release:
        description: 'Automatically release after Apple approval'
        required: false
        type: boolean
        default: true
      phased_release:
        description: 'Use phased release for approved App Store builds'
        required: false
        type: boolean
        default: true
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-release:
    name: Validate Release
    runs-on: macos-26
    timeout-minutes: 20
    permissions:
      contents: read
      checks: read
      statuses: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      build_number: ${{ steps.version.outputs.build_number }}

    steps:
      - uses: actions/checkout@v6

      - name: Validate release source
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TYPE: ${{ github.event.inputs.release_type || 'testflight' }}
        run: .github/scripts/validate-release-source.sh

      - name: Extract version info
        id: version
        run: |
          cd apps/ios

          # Info.plist stores the Xcode placeholder, so resolve the real app
          # version from build settings before passing it to downstream jobs.
          VERSION=$(xcodebuild \
            -project LogYourBody.xcodeproj \
            -scheme LogYourBody \
            -configuration Release \
            -showBuildSettings 2>/dev/null \
            | awk -F ' = ' '/MARKETING_VERSION/ { print $2; exit }')

          UNRESOLVED_MARKER="\$("
          if [ -z "$VERSION" ] || printf '%s' "$VERSION" | grep -qF "$UNRESOLVED_MARKER"; then
            echo "::error::Unable to resolve MARKETING_VERSION for release"
            exit 1
          fi

          # Generate build number with timestamp
          BUILD_NUMBER=$(date -u +%Y%m%d%H%M%S)

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"

          echo "📦 Version: $VERSION"
          echo "🔢 Build: $BUILD_NUMBER"

  # Reuse artifacts from preview if possible
  check-existing-build:
    name: Check Existing Build
    needs: validate-release
    runs-on: ubuntu-latest
    outputs:
      has_artifact: ${{ steps.check.outputs.exists }}
      artifact_url: ${{ steps.check.outputs.url }}

    steps:
      - name: Check for existing preview artifact
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Look for recent successful preview builds
          echo "🔍 Checking for reusable preview build..."

          # This is a placeholder - in production, you'd check artifact storage
          echo "exists=false" >> "$GITHUB_OUTPUT"
          echo "ℹ️ No reusable build found, will build fresh"

  build-release:
    name: Build Release
    needs: [validate-release, check-existing-build]
    if: needs.check-existing-build.outputs.has_artifact != 'true'
    runs-on: macos-26
    timeout-minutes: 30
    environment:
      name: ${{ github.event.inputs.release_type == 'app_store' && 'Production' || 'production-testflight' }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup iOS Build Environment
        uses: ./.github/actions/setup-ios-build
        with:
          xcode-version: 'latest-stable'
          working-directory: apps/ios
          create-config-files: 'false'

      - name: Write production iOS config
        run: apps/ios/Scripts/write_release_config.sh
        env:
          CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
          REVENUE_CAT_PUBLIC_KEY: ${{ secrets.REVENUE_CAT_PUBLIC_KEY }}
          STATSIG_CLIENT_SDK_KEY: ${{ secrets.STATSIG_CLIENT_SDK_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      - name: Verify RevenueCat iOS offering
        run: apps/ios/Scripts/verify_revenuecat_offerings.sh
        env:
          REVENUE_CAT_PUBLIC_KEY: ${{ secrets.REVENUE_CAT_PUBLIC_KEY }}

      - name: Install Compatible OpenSSL
        run: |
          if brew list openssl@1.1 >/dev/null 2>&1 || brew install openssl@1.1; then
            echo "$(brew --prefix openssl@1.1)/bin" >> "$GITHUB_PATH"
          else
            echo "::warning::openssl@1.1 unavailable; continuing with the runner OpenSSL"
          fi

      - name: Setup Match Authentication
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          cd apps/ios
          mkdir -p fastlane

          ruby <<'RUBY'
          require "json"

          api_key = {
            "key_id" => ENV.fetch("ASC_KEY_ID"),
            "issuer_id" => ENV.fetch("ASC_ISSUER_ID"),
            "key" => ENV.fetch("ASC_PRIVATE_KEY").gsub("\\n", "\n"),
            "duration" => 1200,
            "in_house" => false
          }

          File.write("fastlane/api_key.json", JSON.pretty_generate(api_key))
          JSON.parse(File.read("fastlane/api_key.json"))
          RUBY

          # Set API key path for subsequent steps
          echo "APP_STORE_CONNECT_API_KEY_PATH=$(pwd)/fastlane/api_key.json" >> "$GITHUB_ENV"

      - name: Sync Certificates with Match
        uses: ./.github/actions/sync-match
        with:
          match_password: ${{ secrets.MATCH_PASSWORD }}
          match_git_url: ${{ secrets.MATCH_GIT_URL }}
          match_git_basic: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}

      - name: Set Environment Variables for Build
        run: |
          cd apps/ios
          echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}" >> "$GITHUB_ENV"
          echo "APP_STORE_APP_ID=${{ secrets.APP_STORE_APP_ID }}" >> "$GITHUB_ENV"

      - name: Update version and build
        run: |
          cd apps/ios

          # Update build number
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ needs.validate-release.outputs.build_number }}" LogYourBody/Info.plist

          echo "📱 Building iOS app for release..."

      - name: Archive and export
        run: |
          set -o pipefail
          cd apps/ios

          # Use Fastlane to build while preserving its exit status through tee.
          bundle exec fastlane build_release 2>&1 | tee fastlane.log
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          MATCH_GIT_BRANCH: ${{ secrets.MATCH_GIT_BRANCH || 'main' }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: ios-release-build
          path: apps/ios/build/*.ipa
          retention-days: 3

      - name: Cleanup
        if: always()
        run: |
          cd apps/ios
          # API key is now handled via environment variables

  deploy-testflight:
    name: Deploy to TestFlight
    needs: [validate-release, build-release]
    if: github.event.inputs.release_type != 'app_store'
    permissions:
      contents: write
    uses: ./.github/workflows/ios-testflight-deploy.yml
    with:
      distribution_group: production
      build_number: ${{ needs.validate-release.outputs.build_number }}
      version_name: ${{ needs.validate-release.outputs.version }}
      artifact_name: ios-release-build
      environment: production-testflight
      release_notes: |
        Version ${{ needs.validate-release.outputs.version }}
        Build ${{ needs.validate-release.outputs.build_number }}

        This is a production release candidate.

        Changes:
        - All features tested in preview environment
        - Ready for production release

        Please test thoroughly before App Store submission.
    secrets: inherit

  deploy-app-store:
    name: Deploy to App Store
    needs: [validate-release, build-release]
    if: github.event.inputs.release_type == 'app_store'
    runs-on: macos-26
    timeout-minutes: 30
    environment:
      name: production-app-store
      url: https://apps.apple.com/us/app/logyourbody/id6739360530

    steps:
      - uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-release-build
          path: apps/ios/build

      - name: Setup iOS Build Environment
        uses: ./.github/actions/setup-ios-build
        with:
          xcode-version: 'latest-stable'
          working-directory: apps/ios

      - name: Set Environment Variables for Build
        run: |
          cd apps/ios
          echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}" >> "$GITHUB_ENV"
          echo "APP_STORE_APP_ID=${{ secrets.APP_STORE_APP_ID }}" >> "$GITHUB_ENV"

      - name: Setup App Store Connect Authentication
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          cd apps/ios
          mkdir -p fastlane

          ruby <<'RUBY'
          require "json"

          api_key = {
            "key_id" => ENV.fetch("ASC_KEY_ID"),
            "issuer_id" => ENV.fetch("ASC_ISSUER_ID"),
            "key" => ENV.fetch("ASC_PRIVATE_KEY").gsub("\\n", "\n"),
            "duration" => 1200,
            "in_house" => false
          }

          File.write("fastlane/api_key.json", JSON.pretty_generate(api_key))
          JSON.parse(File.read("fastlane/api_key.json"))
          RUBY

          echo "APP_STORE_CONNECT_API_KEY_PATH=$(pwd)/fastlane/api_key.json" >> "$GITHUB_ENV"

      - name: Ensure App Store Free Pricing
        run: |
          cd apps/ios
          bundle exec ruby ../../.github/scripts/ensure-app-store-free-pricing.rb
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_APP_ID: ${{ secrets.APP_STORE_APP_ID }}
          APP_IDENTIFIER: com.logyourbody.app

      - name: Run Fastlane Precheck
        run: |
          cd apps/ios
          bundle exec fastlane precheck 2>&1 | tee precheck.log

          # Check for errors and surface them in the summary
          if grep -E "error:|duplicate|signing|Error:|ERROR:|Failed|FAILED" precheck.log; then
            echo "::error::Precheck errors detected - see highlighted lines above"
            exit 1
          fi
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_APP_ID: ${{ secrets.APP_STORE_APP_ID }}

      - name: Submit to App Store
        run: |
          cd apps/ios

          SUBMIT_FOR_REVIEW="${{ github.event.inputs.submit_for_review || 'true' }}"
          AUTOMATIC_RELEASE="${{ github.event.inputs.automatic_release || 'true' }}"
          PHASED_RELEASE="${{ github.event.inputs.phased_release || 'true' }}"

          IPA_PATH="$(find "$GITHUB_WORKSPACE/apps/ios/build" -name "*.ipa" -type f -print -quit)"
          if [ -z "$IPA_PATH" ]; then
            echo "::error::No IPA file found in downloaded build artifact"
            find "$GITHUB_WORKSPACE/apps/ios/build" -maxdepth 4 -type f -print || true
            exit 1
          fi

          echo "Submitting IPA: $IPA_PATH"

          # Submit for review
          bundle exec fastlane submit_app_store \
            ipa_path:"$IPA_PATH" \
            submit_for_review:$SUBMIT_FOR_REVIEW \
            automatic_release:$AUTOMATIC_RELEASE \
            phased_release:$PHASED_RELEASE 2>&1 | tee submit.log

          # Check for errors and surface them in the summary
          if grep -E "error:|duplicate|signing|Error:|ERROR:|Failed|FAILED" submit.log; then
            echo "::error::Submission errors detected - see highlighted lines above"
            exit 1
          fi
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_APP_ID: ${{ secrets.APP_STORE_APP_ID }}
          APP_REVIEW_FIRST_NAME: ${{ vars.APP_REVIEW_FIRST_NAME }}
          APP_REVIEW_LAST_NAME: ${{ vars.APP_REVIEW_LAST_NAME }}
          APP_REVIEW_EMAIL_ADDRESS: ${{ vars.APP_REVIEW_EMAIL_ADDRESS }}
          APP_REVIEW_PHONE_NUMBER: ${{ secrets.APP_REVIEW_PHONE_NUMBER || vars.APP_REVIEW_PHONE_NUMBER }}
          APP_REVIEW_NOTES: ${{ vars.APP_REVIEW_NOTES }}

      - name: Cleanup
        if: always()
        run: |
          cd apps/ios
          rm -f fastlane/api_key.json

  create-release:
    name: Create Release
    needs: [validate-release, deploy-testflight, deploy-app-store]
    if: always() && (needs.deploy-testflight.result == 'success' || needs.deploy-app-store.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Prepare release metadata
        id: release_metadata
        run: |
          DEPLOYMENT_TYPE="${{ github.event.inputs.release_type || 'testflight' }}"
          VERSION="ios-v${{ needs.validate-release.outputs.version }}"

          if [[ "$DEPLOYMENT_TYPE" == "app_store" ]]; then
            TAG="$VERSION"
            PRERELEASE=false
          else
            TAG="$VERSION-testflight.${{ needs.validate-release.outputs.build_number }}"
            PRERELEASE=true
          fi

          {
            echo "deployment_type=$DEPLOYMENT_TYPE"
            echo "prerelease=$PRERELEASE"
            echo "tag=$TAG"
            echo "version=$VERSION"
          } >> "$GITHUB_OUTPUT"

      - name: Tag release
        id: tag_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.release_metadata.outputs.tag }}"

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "created=false" >> "$GITHUB_OUTPUT"
            echo "Tag already exists: $TAG"
            exit 0
          fi

          # Create git tag
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -a "$TAG" -m "iOS Release $TAG

          Build: ${{ needs.validate-release.outputs.build_number }}
          Deployment: ${{ steps.release_metadata.outputs.deployment_type }}"

          # Push tag
          git push origin "$TAG"

          echo "created=true" >> "$GITHUB_OUTPUT"
          echo "Tagged release: $TAG"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.release_metadata.outputs.tag }}"
          VERSION="${{ steps.release_metadata.outputs.version }}"
          DEPLOYMENT_TYPE="${{ steps.release_metadata.outputs.deployment_type }}"
          PRERELEASE="${{ steps.release_metadata.outputs.prerelease }}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release already exists: $TAG"
            exit 0
          fi

          RELEASE_ARGS=()
          if [[ "$PRERELEASE" == "true" ]]; then
            RELEASE_ARGS+=(--prerelease)
          fi

          # Generate release notes
          gh release create "$TAG" \
            --title "iOS Release $TAG" \
            "${RELEASE_ARGS[@]}" \
            --notes "## 📱 iOS Release $TAG

            **Build Number**: ${{ needs.validate-release.outputs.build_number }}
            **Deployment**: $DEPLOYMENT_TYPE
            **Version**: $VERSION

            ### Changes
            This release includes all changes that have been tested in the preview environment.

            ### Deployment Info
            - **Environment**: Production
            - **Commit**: ${{ github.sha }}
            - **Deployed by**: @${{ github.actor }}
            - **Workflow**: [View Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            ### Installation
            $(if [[ "$DEPLOYMENT_TYPE" == "app_store" ]]; then
              echo "- **App Store**: Pending review"
            else
              echo "- **TestFlight**: Available for all testers"
            fi)

            ---
            *Automated release via three-loop CI/CD system*"
