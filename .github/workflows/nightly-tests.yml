# Nightly Tests
#
# PURPOSE: Consolidated nightly test suite running both unit tests and E2E tests
# in parallel. Alerts to Slack on failures.
#
# REPLACES: nightly-unit-tests.yml, nightly-e2e-tests.yml
#
# SCHEDULE: Daily at 2:00 AM America/Los_Angeles during daylight saving time
# (both suites run in parallel). Keep UTC here until actionlint accepts
# GitHub's timezone-aware schedule key.

name: Nightly Tests

on:
  schedule:
    - cron: '0 2 * * *'
      timezone: 'America/Los_Angeles'
  workflow_dispatch:
    inputs:
      suite:
        description: 'Which suite to run'
        type: choice
        options:
          - all
          - unit
          - e2e
          - design-v1
        default: all
      coverage:
        description: 'Enable unit test coverage report'
        required: false
        default: false
        type: boolean
      test_filter:
        description: 'E2E test file pattern (leave empty for full suite)'
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: nightly-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  knip:
    name: Knip Dead Code Audit
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.suite == 'all' ||
      github.event.inputs.suite == 'unit'
    runs-on: ${{ vars.CI_FAST_RUNNER }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-node-pnpm

      - name: Run Knip
        run: pnpm knip

  # ==========================================================================
  # Unit Tests
  # ==========================================================================
  unit-tests:
    name: Full Unit Test Suite
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.suite == 'all' ||
      github.event.inputs.suite == 'unit'
    runs-on: ${{ vars.CI_FAST_RUNNER }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-node-pnpm

      - name: Run full unit test suite
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.coverage }}" = "true" ]; then
            pnpm --filter=@jovie/web run test -- --coverage
          else
            pnpm --filter=@jovie/web run test
          fi
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}

      - name: Upload coverage report
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.coverage == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unit-test-coverage
          path: apps/web/coverage/
          retention-days: 7

  # ==========================================================================
  # E2E Tests
  # ==========================================================================
  e2e-tests:
    name: Nightly E2E Suite
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.suite == 'all' ||
      github.event.inputs.suite == 'e2e' ||
      github.event.inputs.suite == 'design-v1'
    environment: Preview – jovie
    runs-on: ${{ vars.CI_FAST_RUNNER }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-node-pnpm

      - name: Create ephemeral Neon database branch
        id: neon-branch
        uses: ./.github/actions/neon-create-branch-with-retry
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: nightly-e2e-${{ github.run_id }}
          role: neondb_owner
          api_key: ${{ secrets.NEON_API_KEY }}
          expires_in_hours: '3'

      - name: Run database migrations
        run: pnpm --filter=@jovie/web run drizzle:migrate:ci
        env:
          DATABASE_URL: ${{ steps.neon-branch.outputs.db_url }}
          NODE_ENV: test
          GIT_BRANCH: nightly
          ALLOW_PROD_MIGRATIONS: 'true'

      - name: Cache Playwright Browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('pnpm-lock.yaml', 'playwright.config*.ts') }}
          restore-keys: |
            ${{ runner.os }}-playwright-chromium-

      - name: Install Playwright (Chromium only)
        run: pnpm --filter=@jovie/web exec playwright install chromium --with-deps

      - name: Seed nightly QA data
        if: ${{ github.event_name == 'schedule' || github.event.inputs.test_filter == '' || github.event.inputs.suite == 'design-v1' }}
        run: |
          cd apps/web
          pnpm run seed:test-data
        env:
          DATABASE_URL: ${{ steps.neon-branch.outputs.db_url }}
          NODE_ENV: test
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          E2E_CLERK_USER_ID: ${{ secrets.E2E_CLERK_USER_ID }}
          E2E_CLERK_USER_USERNAME: ${{ secrets.E2E_CLERK_USER_USERNAME }}
          E2E_CLERK_USER_PASSWORD: ${{ secrets.E2E_CLERK_USER_PASSWORD }}

      - name: Start route QA bypass server
        if: ${{ github.event_name == 'schedule' || github.event.inputs.test_filter == '' || github.event.inputs.suite == 'design-v1' }}
        run: |
          cd apps/web
          pnpm run dev:local:playwright > "$RUNNER_TEMP/nightly-qa-web.log" 2>&1 &
          echo $! > "$RUNNER_TEMP/nightly-qa-web.pid"
          for _ in $(seq 1 90); do
            if curl -fsS http://127.0.0.1:3100/api/dev/test-auth/session >/dev/null; then
              echo "Nightly QA bypass server is ready."
              for persona in creator creator-ready; do
                for attempt in 1 2 3; do
                  if curl -fsS -X POST http://127.0.0.1:3100/api/dev/test-auth/session \
                    -H 'content-type: application/json' \
                    --data "{\"persona\":\"$persona\"}" >/dev/null; then
                    break
                  fi
                  if [ "$attempt" = "3" ]; then
                    echo "Failed to prepare $persona bypass persona." >&2
                    cat "$RUNNER_TEMP/nightly-qa-web.log"
                    exit 1
                  fi
                  sleep 5
                done
              done
              echo "Nightly QA bypass personas are ready."
              exit 0
            fi
            sleep 2
          done
          cat "$RUNNER_TEMP/nightly-qa-web.log"
          exit 1
        env:
          DATABASE_URL: ${{ steps.neon-branch.outputs.db_url }}
          NODE_ENV: test
          PORT: '3100'
          BASE_URL: http://127.0.0.1:3100
          NEXT_PUBLIC_APP_URL: http://127.0.0.1:3100
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          E2E_CLERK_USER_ID: ${{ secrets.E2E_CLERK_USER_ID }}
          E2E_USE_TEST_AUTH_BYPASS: '1'
          E2E_FAST_ONBOARDING: '1'
          E2E_TEST_AUTH_PERSONA: creator
          NEXT_PUBLIC_E2E_MODE: '1'
          NEXT_PUBLIC_CLERK_MOCK: '1'
          NEXT_PUBLIC_CLERK_PROXY_DISABLED: '1'
          NEXT_DISABLE_TOOLBAR: '1'
          E2E_ALLOW_DEV_CSP: '1'
          FLAGS_SECRET: ${{ secrets.FLAGS_SECRET }}

      - name: Run nightly route QA breadth pass
        # Temporarily keep this flaky breadth pass out of scheduled runs.
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.test_filter == '' && github.event.inputs.suite != 'design-v1' }}
        run: |
          cd apps/web
          pnpm run qa:routes
        env:
          DATABASE_URL: ${{ steps.neon-branch.outputs.db_url }}
          NODE_ENV: test
          ROUTE_QA_BASE_URL: http://127.0.0.1:3100
          ROUTE_QA_OUTPUT_DIR: nightly-route-qa
          E2E_CLERK_USER_ID: ${{ secrets.E2E_CLERK_USER_ID }}

      - name: Run full surface chaos sweep
        if: ${{ github.event_name == 'schedule' || (github.event.inputs.test_filter == '' && github.event.inputs.suite != 'design-v1') }}
        run: |
          cd apps/web
          pnpm playwright test tests/e2e/nightly/full-surface-chaos.spec.ts --config=playwright.config.nightly.ts --project=chromium
          if [ -f test-results/nightly-results.json ]; then
            cp test-results/nightly-results.json test-results/full-surface-chaos-report.json
          fi
        env:
          DATABASE_URL: ${{ steps.neon-branch.outputs.db_url }}
          NODE_ENV: test
          BASE_URL: http://127.0.0.1:3100
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          E2E_CLERK_USER_ID: ${{ secrets.E2E_CLERK_USER_ID }}
          E2E_USE_TEST_AUTH_BYPASS: '1'
          E2E_FAST_ONBOARDING: '1'
          E2E_TEST_AUTH_PERSONA: creator
          E2E_SKIP_SEED: '1'
          E2E_SKIP_WARMUP: '1'
          FLAGS_SECRET: ${{ secrets.FLAGS_SECRET }}

      - name: Stop route QA bypass server
        if: ${{ always() && (github.event_name == 'schedule' || github.event.inputs.test_filter == '' || github.event.inputs.suite == 'design-v1') }}
        run: |
          if [ -f "$RUNNER_TEMP/nightly-qa-web.pid" ]; then
            pid="$(cat "$RUNNER_TEMP/nightly-qa-web.pid")"
            kill "$pid" 2>/dev/null || true
            wait "$pid" 2>/dev/null || true
          fi

      - name: Run nightly E2E tests
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.suite != 'design-v1' }}
        run: |
          cd apps/web
          if [ -n "${{ github.event.inputs.test_filter }}" ]; then
            pnpm playwright test "${{ github.event.inputs.test_filter }}" --config=playwright.config.nightly.ts --project=chromium --reporter=line
          else
            pnpm playwright test --config=playwright.config.nightly.ts --project=chromium --reporter=line --grep-invert=@full-surface-chaos
          fi
        env:
          DATABASE_URL: ${{ steps.neon-branch.outputs.db_url }}
          NODE_ENV: test
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          E2E_CLERK_USER_USERNAME: ${{ secrets.E2E_CLERK_USER_USERNAME }}
          E2E_CLERK_USER_PASSWORD: ${{ secrets.E2E_CLERK_USER_PASSWORD }}
          FLAGS_SECRET: ${{ secrets.FLAGS_SECRET }}

      - name: Upload Playwright Report on Failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nightly-e2e-report-${{ github.run_id }}
          path: apps/web/playwright-report/
          retention-days: 7

      - name: Upload Test Results on Failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nightly-e2e-results-${{ github.run_id }}
          path: apps/web/test-results/
          retention-days: 7

      - name: Upload route QA ledger
        if: ${{ always() && (github.event_name == 'schedule' || github.event.inputs.test_filter == '') }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nightly-route-qa-${{ github.run_id }}
          path: apps/web/test-results/route-qa/nightly-route-qa/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload full surface chaos report
        if: ${{ always() && (github.event_name == 'schedule' || github.event.inputs.test_filter == '') }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: full-surface-chaos-${{ github.run_id }}
          path: apps/web/test-results/full-surface-chaos-report.json
          if-no-files-found: ignore
          retention-days: 7

      - name: Cleanup Clerk E2E test users
        if: always()
        continue-on-error: true
        run: |
          cd apps/web
          if [[ "${CLERK_SECRET_KEY:-}" != sk_test_* ]]; then
            echo "Skipping Clerk E2E cleanup because CLERK_SECRET_KEY is not a Clerk test secret."
            exit 0
          fi
          pnpm tsx scripts/cleanup-e2e-users.ts --force
        env:
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          DATABASE_URL: ${{ steps.neon-branch.outputs.db_url }}

      - name: Cleanup Neon branch
        if: always()
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
          BRANCH_NAME: nightly-e2e-${{ github.run_id }}
        run: |
          if [ -z "$NEON_API_KEY" ] || [ -z "$NEON_PROJECT_ID" ]; then
            echo "Neon credentials missing; skipping branch cleanup." >&2
            exit 0
          fi

          echo "Deleting Neon branch '$BRANCH_NAME' for nightly run ${{ github.run_id }}..."
          pnpm dlx neonctl branches delete "$BRANCH_NAME" --project-id "$NEON_PROJECT_ID" || {
            echo "Branch '$BRANCH_NAME' not found or already deleted; ignoring." >&2
          }

  # ==========================================================================
  # Notifications
  # ==========================================================================
  notify:
    name: Notify Results
    needs: [knip, unit-tests, e2e-tests]
    if: always()
    runs-on: ${{ vars.CI_FAST_RUNNER }}
    steps:
      - name: Slack notification on Knip failure
        if: ${{ needs.knip.result == 'failure' }}
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
        with:
          channel-id: ${{ vars.SLACK_CI_CHANNEL_ID }}
          payload: |
            {
              "text": "Nightly Knip audit failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Nightly Knip Audit Failed*\n\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                  }
                }
              ]
            }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Slack notification on unit test failure
        if: ${{ needs.unit-tests.result == 'failure' }}
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
        with:
          channel-id: ${{ vars.SLACK_CI_CHANNEL_ID }}
          payload: |
            {
              "text": "Nightly unit tests failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Nightly Unit Tests Failed*\n\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                  }
                }
              ]
            }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Slack notification on E2E failure
        if: ${{ needs.e2e-tests.result == 'failure' }}
        uses: 8398a7/action-slack@77eaa4f1c608a7d68b38af4e3f739dcd8cba273e # v3.19.0
        with:
          status: custom
          channel: '#alerts-critical'
          author_name: 'Nightly Tests'
          custom_payload: |
            {
              "text": "Nightly E2E tests failed",
              "attachments": [
                {
                  "color": "danger",
                  "fields": [
                    { "title": "Workflow", "value": "Nightly E2E Tests", "short": true },
                    { "title": "Status", "value": "Failed", "short": true },
                    { "title": "Run", "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>", "short": false }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Slack notification on all success
        if: >-
          needs.knip.result != 'failure' &&
          needs.unit-tests.result != 'failure' &&
          needs.e2e-tests.result != 'failure'
        uses: 8398a7/action-slack@77eaa4f1c608a7d68b38af4e3f739dcd8cba273e # v3.19.0
        with:
          status: custom
          channel: '#monitoring'
          author_name: 'Nightly Tests'
          custom_payload: |
            {
              "text": "Nightly tests passed",
              "attachments": [
                {
                  "color": "good",
                  "fields": [
                    { "title": "Workflow", "value": "Nightly Tests", "short": true },
                    { "title": "Status", "value": "All Passed", "short": true },
                    { "title": "Run", "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>", "short": false }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
